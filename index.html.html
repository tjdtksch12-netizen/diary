<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결!합! Online - 멀티플레이어</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        :root { --main-red: #8b0000; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Jua', sans-serif; }
        body { background-color: var(--main-red); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .screen { display: none; width: 100%; max-width: 1200px; padding: 20px; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* 공통 버튼 */
        .btn { padding: 12px 25px; font-size: 1.2rem; background: var(--gold); color: var(--main-red); border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 규칙 섹션 (그림 예시) */
        .example-container { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 10px 0; }
        .ex-card { width: 60px; height: 60px; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; border-radius: 5px; font-size: 10px; }

        /* 게임 보드 */
        .game-main { display: grid; grid-template-columns: 250px 1fr 250px; width: 100%; gap: 20px; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 120px); grid-gap: 15px; background: #5c0000; padding: 20px; border-radius: 10px; justify-content: center; }
        .card { width: 120px; height: 120px; border: 3px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .card.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }
        
        /* 도형 CSS */
        .shape-circle { width: 70px; height: 70px; border-radius: 50%; }
        .shape-square { width: 70px; height: 70px; }
        .shape-triangle { width: 0; height: 0; border-left: 35px solid transparent; border-right: 35px solid transparent; border-bottom: 70px solid; }
        .bg-black { background-color: #111; } .bg-white { background-color: #eee; } .bg-gray { background-color: #777; }

        /* 타이머 및 상태 */
        #timer-bar { width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        #timer-fill { width: 100%; height: 100%; background: var(--gold); transition: width 1s linear; }
        .status-panel { text-align: center; font-size: 1.5rem; margin-bottom: 10px; color: var(--gold); }

        /* 순위표 */
        #rank-list { width: 100%; max-width: 400px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; margin-top: 20px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #555; }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active">
        <h1>결! 합! ONLINE</h1>
        <div id="user-info" style="margin: 20px 0;">로딩 중...</div>
        <div id="rank-list">
            <h3>🏆 전적 랭킹</h3>
            <div id="rank-content"></div>
        </div>
        <div style="margin-top: 20px;">
            <input type="text" id="room-id-input" placeholder="방 코드 입력" style="padding: 10px; border-radius: 5px;">
            <button class="btn" onclick="joinRoom()">방 입장</button>
            <button class="btn" onclick="createRoom()">방 만들기</button>
        </div>
        <button class="btn" onclick="showScreen('screen-rules')" style="background: #555; color: white; margin-top: 10px;">게임 방법</button>
    </div>

    <div id="screen-rules" class="screen">
        <h2>게임 설명</h2>
        <div style="text-align: left; max-width: 600px; line-height: 1.6;">
            <p>1. 9장의 카드 중 3장을 골라 '합'을 찾습니다.</p>
            <p>2. <b>'합'의 조건:</b> 모양, 색, 배경색 세 속성이 각각 <b>모두 같거나 모두 다를 때</b></p>
            <div class="example-container">
                <div class="ex-card bg-black"><div class="shape-circle" style="background:red; width:30px; height:30px;"></div></div>
                <div class="ex-card bg-black"><div class="shape-circle" style="background:blue; width:30px; height:30px;"></div></div>
                <div class="ex-card bg-black"><div class="shape-circle" style="background:yellow; width:30px; height:30px;"></div></div>
                <span>← <highlight style="color:var(--gold)">배경/모양 같음, 색 다름 (합!)</highlight></span>
            </div>
            <p>3. <b>합! 외치기:</b> 30초 내에 선택해야 하며, 실패 시 상대에게 기회가 넘어갑니다.</p>
        </div>
        <button class="btn" onclick="showScreen('screen-auth')">뒤로가기</button>
    </div>

    <div id="screen-game" class="screen">
        <h2 id="room-display">방 코드: ---</h2>
        <div id="timer-bar"><div id="timer-fill"></div></div>
        <div class="status-panel" id="game-status">상대방을 기다리는 중...</div>
        
        <div class="game-main">
            <div class="player-panel" id="p1-panel">
                <h3 id="p1-name">Waiting...</h3>
                <div id="p1-score" style="font-size: 2rem;">0</div>
                <button class="btn" id="btn-hap" onclick="callHap()" disabled>합!</button>
                <button class="btn" id="btn-gyul" onclick="callGyul()" disabled>결!</button>
            </div>

            <div class="grid" id="board"></div>

            <div class="player-panel" id="p2-panel">
                <h3 id="p2-name">Waiting...</h3>
                <div id="p2-score" style="font-size: 2rem;">0</div>
            </div>
        </div>
    </div>

<script>
    // --- Firebase 설정 (여기에 자신의 정보를 넣으세요) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- 게임 변수 ---
    let myUid, myName, currentRoomId;
    let isHapCalled = false;
    let selectedCards = [];
    let timerInterval;

    // --- 로그인 및 유저 관리 ---
    auth.onAuthStateChanged(async user => {
        if (!user) {
            await auth.signInAnonymously();
        } else {
            myUid = user.uid;
            myName = "플레이어_" + myUid.slice(0, 4);
            document.getElementById('user-info').innerText = `${myName}님 환영합니다!`;
            updateRanking();
            // 유저 데이터 초기화 (전적 없을 시)
            db.ref('users/' + myUid).transaction(curr => curr || { name: myName, wins: 0, losses: 0 });
        }
    });

    function updateRanking() {
        db.ref('users').orderByChild('wins').limitToLast(10).on('value', snap => {
            const list = document.getElementById('rank-content');
            list.innerHTML = "";
            const users = [];
            snap.forEach(child => users.push(child.val()));
            users.reverse().forEach((u, i) => {
                list.innerHTML += `<div class="rank-item"><span>${i+1}. ${u.name}</span><span>${u.wins}승 ${u.losses}패</span></div>`;
            });
        });
    }

    // --- 방 관리 ---
    function createRoom() {
        const roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        currentRoomId = roomId;
        const deck = generateDeck();
        const board = deck.splice(0, 9);
        
        db.ref('rooms/' + roomId).set({
            p1: { uid: myUid, name: myName, score: 0 },
            p2: null,
            board: board,
            deck: deck,
            status: 'WAITING',
            hapTurn: null,
            timer: 0
        });
        joinRoomLogic(roomId);
    }

    function joinRoom() {
        const roomId = document.getElementById('room-id-input').value.toUpperCase();
        if (!roomId) return;
        db.ref('rooms/' + roomId).once('value', snap => {
            if (!snap.exists()) return alert("방이 없습니다.");
            const room = snap.val();
            if (room.p2 && room.p2.uid !== myUid) return alert("방이 꽉 찼습니다.");
            
            if (!room.p2 && room.p1.uid !== myUid) {
                db.ref('rooms/' + roomId + '/p2').set({ uid: myUid, name: myName, score: 0 });
                db.ref('rooms/' + roomId).update({ status: 'PLAYING' });
            }
            currentRoomId = roomId;
            joinRoomLogic(roomId);
        });
    }

    function joinRoomLogic(roomId) {
        showScreen('screen-game');
        document.getElementById('room-display').innerText = `방 코드: ${roomId}`;
        
        db.ref('rooms/' + roomId).on('value', snap => {
            const room = snap.val();
            if (!room) return;
            renderGame(room);
        });
    }

    // --- 게임 엔진 및 렌더링 ---
    function generateDeck() {
        const shapes = ['circle', 'triangle', 'square'];
        const colors = ['red', 'blue', 'yellow'];
        const bgs = ['black', 'white', 'gray'];
        let d = [];
        shapes.forEach(s => colors.forEach(c => bgs.forEach(b => d.push({s, c, b}))));
        return d.sort(() => Math.random() - 0.5);
    }

    function renderGame(room) {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = "";
        room.board.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = `card bg-${card.b} ${selectedCards.includes(i) ? 'selected' : ''}`;
            div.onclick = () => selectCard(i, room);
            
            const shape = document.createElement('div');
            shape.className = `shape-${card.s}`;
            if(card.s === 'triangle') shape.style.borderBottomColor = card.c;
            else shape.style.backgroundColor = card.c;
            
            div.appendChild(shape);
            boardEl.appendChild(div);
        });

        // 플레이어 정보 업데이트
        document.getElementById('p1-name').innerText = room.p1.name;
        document.getElementById('p1-score').innerText = room.p1.score;
        if (room.p2) {
            document.getElementById('p2-name').innerText = room.p2.name;
            document.getElementById('p2-score').innerText = room.p2.score;
        }

        // 상태 및 버튼 제어
        const isMyTurnHap = room.hapTurn && room.hapTurn.uid === myUid;
        document.getElementById('btn-hap').disabled = room.status !== 'PLAYING' || room.hapTurn;
        document.getElementById('btn-gyul').disabled = room.status !== 'PLAYING' || room.hapTurn;

        if (room.hapTurn) {
            document.getElementById('game-status').innerText = `${room.hapTurn.name}님 합 선택 중!`;
            startTimer(room.hapTurn.startTime);
        } else {
            document.getElementById('game-status').innerText = room.status === 'WAITING' ? "상대방 대기 중..." : "합!이나 결!을 외치세요";
            stopTimer();
        }
    }

    // --- 타이머 로직 (30초) ---
    function startTimer(startTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const remain = 30 - elapsed;
            document.getElementById('timer-fill').style.width = (remain / 30 * 100) + "%";
            
            if (remain <= 0) {
                clearInterval(timerInterval);
                handleTimeout();
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        document.getElementById('timer-fill').style.width = "100%";
    }

    async function handleTimeout() {
        const snap = await db.ref('rooms/' + currentRoomId).once('value');
        const room = snap.val();
        if (room.hapTurn && room.hapTurn.uid === myUid) {
            // 시간이 끝났을 때 내가 공격자였다면 상대에게 기회 넘기기
            const opponent = room.p1.uid === myUid ? room.p2 : room.p1;
            db.ref('rooms/' + currentRoomId + '/hapTurn').set({
                uid: opponent.uid,
                name: opponent.name,
                startTime: Date.now(),
                isChance: true // 기회가 넘어온 상태
            });
            selectedCards = [];
            alert("시간 초과! 상대에게 기회가 넘어갑니다.");
        } else if (room.hapTurn && room.hapTurn.isChance && room.hapTurn.uid === myUid) {
            // 기회를 넘겨받은 사람도 시간을 넘기면 턴 종료 및 감점
            penalty(myUid);
            db.ref('rooms/' + currentRoomId + '/hapTurn').set(null);
            selectedCards = [];
        }
    }

    // --- 게임 로직 연산 ---
    function callHap() {
        db.ref('rooms/' + currentRoomId + '/hapTurn').set({
            uid: myUid,
            name: myName,
            startTime: Date.now()
        });
    }

    function selectCard(idx, room) {
        if (!room.hapTurn || room.hapTurn.uid !== myUid) return;
        if (selectedCards.includes(idx)) return;
        
        selectedCards.push(idx);
        renderGame(room);

        if (selectedCards.length === 3) {
            checkHapResult(room);
        }
    }

    function checkHapResult(room) {
        const cards = selectedCards.map(i => room.board[i]);
        const isCorrect = isHap(cards[0], cards[1], cards[2]);

        if (isCorrect) {
            alert("정답! +1점");
            // 점수 업데이트 및 카드 교체 로직
            const pKey = room.p1.uid === myUid ? 'p1' : 'p2';
            db.ref(`rooms/${currentRoomId}/${pKey}/score`).set(room[pKey].score + 1);
            
            let newBoard = [...room.board];
            let newDeck = [...room.deck];
            selectedCards.forEach(idx => {
                newBoard[idx] = newDeck.length > 0 ? newDeck.pop() : null;
            });
            db.ref(`rooms/${currentRoomId}`).update({ board: newBoard, deck: newDeck, hapTurn: null });
        } else {
            alert("틀렸습니다! 상대에게 기회가 넘어갑니다.");
            const opponent = room.p1.uid === myUid ? room.p2 : room.p1;
            db.ref(`rooms/${currentRoomId}/hapTurn`).set({
                uid: opponent.uid,
                name: opponent.name,
                startTime: Date.now(),
                isChance: true
            });
        }
        selectedCards = [];
    }

    function isHap(c1, c2, c3) {
        const attrs = ['s', 'c', 'b'];
        return attrs.every(a => {
            const v = [c1[a], c2[a], c3[a]];
            return (v[0] === v[1] && v[1] === v[2]) || (v[0] !== v[1] && v[0] !== v[2] && v[1] !== v[2]);
        });
    }

    async function penalty(uid) {
        const snap = await db.ref('rooms/' + currentRoomId).once('value');
        const room = snap.val();
        const pKey = room.p1.uid === uid ? 'p1' : 'p2';
        db.ref(`rooms/${currentRoomId}/${pKey}/score`).set(room[pKey].score - 1);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
