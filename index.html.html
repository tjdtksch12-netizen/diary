<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5년 다이어리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #ffffff;
  font-family: 'Nanum Myeongjo', 'Noto Serif KR', serif;
  color: #111111;
  min-height: 100vh;
}

/* ══════════════════════════════
   비밀번호 잠금 화면
══════════════════════════════ */
#lock-screen {
  position: fixed;
  inset: 0;
  background: #111111;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
#lock-screen.hidden { display: none; }

.lock-title {
  font-family: 'Gowun Batang', serif;
  font-size: 26px;
  color: #ffffff;
  letter-spacing: 0.08em;
  text-align: center;
}
.lock-subtitle {
  font-size: 12px;
  color: #666666;
  letter-spacing: 0.15em;
  margin-top: -16px;
}

.pin-dots {
  display: flex;
  gap: 18px;
  justify-content: center;
  align-items: center;
  height: 24px;
}
.pin-dot {
  width: 15px; height: 15px;
  border-radius: 50%;
  background: #3a3a3a;
  transition: background 0.12s, transform 0.12s;
}
.pin-dot.filled { background: #ffffff; transform: scale(1.12); }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 248px;
}
.num-btn {
  background: #1e1e1e;
  color: #ffffff;
  border: 1px solid #2e2e2e;
  border-radius: 10px;
  font-family: 'Gowun Batang', serif;
  font-size: 22px;
  padding: 18px 0;
  cursor: pointer;
  text-align: center;
  user-select: none;
  transition: background 0.1s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
}
.num-btn:hover  { background: #2e2e2e; }
.num-btn:active { background: #444444; transform: scale(0.95); }
.num-btn.del-btn   { font-size: 16px; color: #888888; background: #181818; }
.num-btn.empty-btn { visibility: hidden; }

.lock-error {
  font-size: 12px;
  color: #ff6060;
  letter-spacing: 0.1em;
  height: 16px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.lock-error.show { opacity: 1; }

.lock-change-hint {
  font-size: 11px;
  color: #555555;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-decoration: underline;
  text-underline-offset: 3px;
  margin-top: -8px;
}
