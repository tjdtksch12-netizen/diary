<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지니어스 게임 센터 - 온라인</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        :root { --main-red: #8b0000; --gold: #ffd700; --dark-bg: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Jua', sans-serif; }
        body { background-color: var(--main-red); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .screen { display: none; width: 100%; max-width: 1200px; padding: 20px; flex-direction: column; align-items: center; }
        .active { display: flex; }

        .btn { padding: 12px 25px; font-size: 1.2rem; background: var(--gold); color: var(--main-red); border: none; border-radius: 8px; cursor: pointer; margin: 5px; transition: 0.2s; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .btn:hover:not(:disabled) { background-color: #ffea00; transform: scale(1.05); }
        .btn:disabled { background: #ccc; cursor: not-allowed; color: #666; }

        /* 로비 & 홈 */
        .game-select-card { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 20px; text-align: center; width: 350px; border: 2px solid var(--gold); cursor: pointer; transition: 0.3s; margin: 10px; }
        .game-select-card:hover { background: rgba(255,215,0,0.2); transform: translateY(-10px); }
        .room-list-container { width: 100%; max-width: 600px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-top: 20px; min-height: 200px; }
        .room-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 10px; }

        /* 십이장기 보드 */
        .janggi-board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(4, 100px); gap: 5px; background: #d2b48c; padding: 10px; border: 5px solid #8b4513; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .janggi-cell { width: 100px; height: 100px; background: #f5deb3; border: 1px solid #deb887; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .janggi-cell.selected { background: #fffacd; box-shadow: inset 0 0 15px var(--gold); }
        .janggi-cell.movable::after { content: ''; width: 20px; height: 20px; background: rgba(0,255,0,0.3); border-radius: 50%; position: absolute; }

        /* 기물 스타일 */
        .piece { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; border: 4px solid; cursor: pointer; transition: 0.2s; user-select: none; }
        .piece.p1 { background: #fff; color: #d32f2f; border-color: #b71c1c; }
        .piece.p2 { background: #333; color: #fff; border-color: #000; transform: rotate(180deg); }
        .piece.captured { width: 60px; height: 60px; font-size: 1.5rem; margin: 5px; transform: none !important; }

        /* 결합 보드 (기존 스타일 유지) */
        .gh-grid { display: grid; grid-template-columns: repeat(3, 120px); grid-gap: 15px; background: #5c0000; padding: 20px; border-radius: 10px; border: 3px solid #3a0000; }
        .gh-card { width: 120px; height: 120px; border: 3px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.1s; background: #000; }
        .gh-card.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .hand-container { display: flex; flex-wrap: wrap; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; min-height: 80px; width: 320px; margin-top: 10px; }
        #timer-bar { width: 100%; max-width: 600px; height: 15px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        #timer-fill { width: 100%; height: 100%; background: #4CAF50; transition: width 1s linear; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active" style="justify-content: center; height: 100vh;">
        <h1 style="font-size: 4rem; color: var(--gold); margin-bottom: 30px;">THE GENIUS</h1>
        <input type="text" id="nickname-input" style="padding:15px; font-size:1.5rem; border-radius:10px; border:none; text-align:center;" placeholder="닉네임 입력">
        <button class="btn" style="margin-top:20px; padding:15px 50px;" onclick="initUser()">입장</button>
    </div>

    <div id="screen-home" class="screen" style="justify-content: center; height: 100vh;">
        <h1 style="margin-bottom: 40px; font-size: 3rem;">게임 선택</h1>
        <div style="display: flex;">
            <div class="game-select-card" onclick="goToLobby('GH')">
                <h2 style="font-size: 2.5rem;">결! 합!</h2>
                <p>그림 속의 규칙을 찾는 논리 게임</p>
            </div>
            <div class="game-select-card" onclick="goToLobby('TJ')">
                <h2 style="font-size: 2.5rem;">십이장기</h2>
                <p>4x3 칸에서 벌어지는 치열한 수싸움</p>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <h1 id="lobby-title" style="font-size: 3rem; color: var(--gold);">로비</h1>
        <div style="margin: 20px 0;">
            <button class="btn" onclick="createRoom()">+ 새 방 만들기</button>
            <button class="btn" onclick="showScreen('screen-home')" style="background:#555; color:#fff;">뒤로가기</button>
        </div>
        <div class="room-list-container">
            <h3 style="margin-bottom:15px;">현재 대기 중인 방</h3>
            <div id="room-list-content"></div>
        </div>
    </div>

    <div id="screen-game-gh" class="screen">
        <h2 id="gh-round-title">ROUND 1 / 5</h2>
        <div id="timer-bar"><div id="timer-fill-gh"></div></div>
        <div id="game-status-gh" style="font-size:1.5rem; margin-bottom:10px;">상대 대기 중...</div>
        <div style="display:flex; gap:30px; align-items:center;">
            <div class="player-panel">
                <div id="gh-p1-name" style="color:#4CAF50">P1</div>
                <div id="gh-p1-score" style="font-size:3rem;">0</div>
            </div>
            <div class="gh-grid" id="gh-board"></div>
            <div class="player-panel">
                <div id="gh-p2-name" style="color:#2196F3">P2</div>
                <div id="gh-p2-score" style="font-size:3rem;">0</div>
            </div>
        </div>
        <div style="margin-top:20px;">
            <button class="btn" id="btn-gh-hap" onclick="callHap()">합!</button>
            <button class="btn" id="btn-gh-gyul" onclick="callGyul()">결!</button>
            <button class="btn" id="btn-gh-start" style="display:none; background:#ff9800; color:#fff;" onclick="startGameGH()">게임 시작</button>
        </div>
    </div>

    <div id="screen-game-tj" class="screen">
        <h2 style="color:var(--gold); font-size:2rem; margin-bottom:10px;">십이장기 (Twelve Janggi)</h2>
        <div id="game-status-tj" style="font-size:1.2rem; margin-bottom:10px;">상대를 기다려주세요</div>
        
        <div style="display:flex; gap:40px; align-items:flex-start;">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div id="tj-p2-name" style="font-size:1.5rem; color:#333; background:#fff; padding:5px 15px; border-radius:5px;">P2</div>
                <div class="hand-container" id="hand-p2"></div>
            </div>

            <div class="janggi-board" id="tj-board"></div>

            <div style="display:flex; flex-direction:column; align-items:center;">
                <div id="tj-p1-name" style="font-size:1.5rem; color:#fff; background:#d32f2f; padding:5px 15px; border-radius:5px;">P1</div>
                <div class="hand-container" id="hand-p1"></div>
            </div>
        </div>
        <button class="btn" id="btn-tj-start" style="display:none; margin-top:20px; background:#ff9800; color:#fff;" onclick="startGameTJ()">게임 시작</button>
    </div>

<script>
    // --- Firebase 설정 ---
    const firebaseConfig = {
      apiKey: "AIzaSyD1y7hpto_WOkwB_ia35epFfe3UjLbetCw",
      authDomain: "game-36d00.firebaseapp.com",
      databaseURL: "https://game-36d00-default-rtdb.firebaseio.com",
      projectId: "game-36d00",
      storageBucket: "game-36d00.firebasestorage.app",
      messagingSenderId: "614344822476",
      appId: "1:614344822476:web:5aa599268660fe7ed5fc69"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let myUid, myName, currentGameType, currentRoomId;
    let selectedPiece = null; // {r, c, type, owner, fromHand}

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initUser() {
        const input = document.getElementById('nickname-input').value.trim();
        if(!input) return alert("닉네임을 입력하세요!");
        myName = input;
        auth.signInAnonymously().then(res => {
            myUid = res.user.uid;
            showScreen('screen-home');
        });
    }

    function goToLobby(type) {
        currentGameType = type;
        document.getElementById('lobby-title').innerText = type === 'GH' ? "결! 합! 로비" : "십이장기 로비";
        showScreen('screen-lobby');
        listenRooms();
    }

    function listenRooms() {
        db.ref('rooms/' + currentGameType).on('value', snap => {
            const list = document.getElementById('room-list-content');
            list.innerHTML = "";
            snap.forEach(child => {
                const room = child.val();
                if(room.status === 'WAITING') {
                    list.innerHTML += `<div class="room-item">
                        <span><b>${room.hostName}</b>님의 방</span>
                        <button class="btn" onclick="joinRoom('${child.key}')">입장</button>
                    </div>`;
                }
            });
        });
    }

    function createRoom() {
        const roomId = Math.random().toString(36).substr(2, 6).toUpperCase();
        const roomData = {
            hostUid: myUid, hostName: myName, status: 'WAITING', p1: {uid: myUid, name: myName, score: 0}
        };
        if(currentGameType === 'TJ') {
            roomData.board = [
                [{t:'sang', o:2}, {t:'jang', o:2}, {t:'sang', o:2}],
                [null, {t:'ja', o:2}, null],
                [null, {t:'ja', o:1}, null],
                [{t:'sang', o:1}, {t:'jang', o:1}, {t:'sang', o:1}]
            ];
            roomData.turn = 1; roomData.p1Hand = []; roomData.p2Hand = [];
        } else {
            roomData.round = 1; roomData.board = generateGHBoard(); roomData.foundHaps = [];
        }
        db.ref(`rooms/${currentGameType}/${roomId}`).set(roomData);
        joinRoomLogic(roomId);
    }

    function joinRoom(id) {
        db.ref(`rooms/${currentGameType}/${id}`).once('value', snap => {
            const room = snap.val();
            if(!room.p2 && room.p1.uid !== myUid) {
                db.ref(`rooms/${currentGameType}/${id}/p2`).set({uid: myUid, name: myName, score: 0});
            }
            joinRoomLogic(id);
        });
    }

    function joinRoomLogic(id) {
        currentRoomId = id;
        showScreen(currentGameType === 'GH' ? 'screen-game-gh' : 'screen-game-tj');
        db.ref(`rooms/${currentGameType}/${id}`).on('value', snap => {
            const room = snap.val();
            if(!room) return;
            currentGameType === 'GH' ? renderGH(room) : renderTJ(room);
        });
    }

    // --- 십이장기 게임 로직 ---
    function renderTJ(room) {
        const boardEl = document.getElementById('tj-board');
        boardEl.innerHTML = "";
        room.board.forEach((row, r) => {
            row.forEach((cell, c) => {
                const div = document.createElement('div');
                div.className = 'janggi-cell';
                if(selectedPiece && selectedPiece.r === r && selectedPiece.c === c) div.classList.add('selected');
                if(cell) {
                    const p = document.createElement('div');
                    p.className = `piece p${cell.o}`;
                    p.innerText = getPieceSymbol(cell.t);
                    div.appendChild(p);
                }
                div.onclick = () => handleTJClick(r, c, room);
                boardEl.appendChild(div);
            });
        });

        // 창고 렌더링
        renderHand('hand-p1', room.p1Hand || [], 1, room);
        renderHand('hand-p2', room.p2Hand || [], 2, room);

        document.getElementById('tj-p1-name').innerText = room.p1.name;
        document.getElementById('tj-p2-name').innerText = room.p2 ? room.p2.name : "대기 중...";
        
        const isMyTurn = (room.turn === 1 && room.p1.uid === myUid) || (room.turn === 2 && room.p2 && room.p2.uid === myUid);
        document.getElementById('game-status-tj').innerText = room.status === 'WAITING' ? "상대를 기다려주세요" : (isMyTurn ? "내 차례입니다!" : "상대방의 차례입니다.");
        
        if(room.status === 'WAITING' && room.p1.uid === myUid && room.p2) {
            document.getElementById('btn-tj-start').style.display = 'block';
        } else {
            document.getElementById('btn-tj-start').style.display = 'none';
        }
    }

    function renderHand(id, hand, owner, room) {
        const el = document.getElementById(id);
        el.innerHTML = "";
        hand.forEach((type, idx) => {
            const p = document.createElement('div');
            p.className = `piece captured p${owner}`;
            p.innerText = getPieceSymbol(type);
            p.onclick = (e) => {
                e.stopPropagation();
                handleHandClick(type, idx, owner, room);
            };
            el.appendChild(p);
        });
    }

    function getPieceSymbol(t) {
        const map = {jang:'將', sang:'象', ja:'卒', hu:'侯'};
        return map[t];
    }

    function handleHandClick(type, idx, owner, room) {
        const myPlayerNum = room.p1.uid === myUid ? 1 : 2;
        if(room.turn !== myPlayerNum || owner !== myPlayerNum) return;
        selectedPiece = { type, owner, fromHand: true, handIdx: idx };
        renderTJ(room);
    }

    function handleTJClick(r, c, room) {
        const myPlayerNum = room.p1.uid === myUid ? 1 : 2;
        if(room.turn !== myPlayerNum || room.status !== 'PLAYING') return;

        const target = room.board[r][c];

        // 1. 창고에서 기물 놓기
        if(selectedPiece && selectedPiece.fromHand) {
            if(!target) {
                const newBoard = JSON.parse(JSON.stringify(room.board));
                newBoard[r][c] = { t: selectedPiece.type, o: myPlayerNum };
                const newHand = room[myPlayerNum === 1 ? 'p1Hand' : 'p2Hand'].filter((_, i) => i !== selectedPiece.handIdx);
                db.ref(`rooms/TJ/${currentRoomId}`).update({
                    board: newBoard,
                    [myPlayerNum === 1 ? 'p1Hand' : 'p2Hand']: newHand,
                    turn: myPlayerNum === 1 ? 2 : 1
                });
                selectedPiece = null;
            }
            return;
        }

        // 2. 기물 선택
        if(target && target.o === myPlayerNum) {
            selectedPiece = { r, c, type: target.t, owner: target.o };
            renderTJ(room);
            return;
        }

        // 3. 기물 이동 및 공격
        if(selectedPiece && !selectedPiece.fromHand) {
            if(isValidMove(selectedPiece.r, selectedPiece.c, r, c, selectedPiece.type, myPlayerNum)) {
                const newBoard = JSON.parse(JSON.stringify(room.board));
                let newP1Hand = [...(room.p1Hand || [])];
                let newP2Hand = [...(room.p2Hand || [])];

                if(target && target.o !== myPlayerNum) {
                    const capturedType = target.t === 'hu' ? 'ja' : target.t;
                    myPlayerNum === 1 ? newP1Hand.push(capturedType) : newP2Hand.push(capturedType);
                    if(target.t === 'jang') return winGameTJ(myPlayerNum);
                }

                let movingPieceType = selectedPiece.type;
                if(movingPieceType === 'ja' && ((myPlayerNum === 1 && r === 0) || (myPlayerNum === 2 && r === 3))) {
                    movingPieceType = 'hu';
                }

                newBoard[r][c] = { t: movingPieceType, o: myPlayerNum };
                newBoard[selectedPiece.r][selectedPiece.c] = null;

                db.ref(`rooms/TJ/${currentRoomId}`).update({
                    board: newBoard,
                    p1Hand: newP1Hand,
                    p2Hand: newP2Hand,
                    turn: myPlayerNum === 1 ? 2 : 1
                });

                // 승리 조건: 장 진격
                if(movingPieceType === 'jang' && ((myPlayerNum === 1 && r === 0) || (myPlayerNum === 2 && r === 3))) {
                    setTimeout(() => checkJangWin(myPlayerNum), 100);
                }

                selectedPiece = null;
            }
        }
    }

    function isValidMove(sr, sc, tr, tc, type, owner) {
        const dr = tr - sr;
        const dc = tc - sc;
        const adr = Math.abs(dr);
        const adc = Math.abs(dc);

        if(adr > 1 || adc > 1) return false;

        if(type === 'jang') return adr <= 1 && adc <= 1;
        if(type === 'sang') return adr === 1 && adc === 1;
        if(type === 'ja') return dc === 0 && dr === (owner === 1 ? -1 : 1);
        if(type === 'hu') {
            if(owner === 1) return !(dr === 1 && adc === 1); // 후는 뒤쪽 대각선 못감
            if(owner === 2) return !(dr === -1 && adc === 1);
        }
        return false;
    }

    function startGameTJ() {
        db.ref(`rooms/TJ/${currentRoomId}`).update({status: 'PLAYING'});
    }

    function winGameTJ(winnerNum) {
        alert(`${winnerNum === 1 ? 'P1' : 'P2'} 승리!`);
        db.ref(`rooms/TJ/${currentRoomId}`).remove();
        showScreen('screen-home');
    }

    function checkJangWin(playerNum) {
        // 실제 방송 룰: 진격 후 한 턴을 버텨야 함 (여기서는 단순화하여 진격 시 승리 문구)
        // alert(playerNum + "번 플레이어의 장이 상대 진영에 도달했습니다!");
    }

    // --- 결합 게임 로직 (기존 로직 이식) ---
    function generateGHBoard() {
        const shapes=['circle','triangle','square'], colors=['red','blue','yellow'], bgs=['black','white','gray'];
        let d = [];
        shapes.forEach(s=>colors.forEach(c=>bgs.forEach(b=>d.push({s,c,b}))));
        return d.sort(()=>Math.random()-0.5).slice(0,9);
    }

    function renderGH(room) {
        const boardEl = document.getElementById('gh-board');
        boardEl.innerHTML = "";
        room.board.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = `gh-card bg-${card.b}`;
            const shape = document.createElement('div');
            shape.className = `shape-${card.s}`;
            const color = card.c === 'red' ? '#f44336' : (card.c === 'blue' ? '#2196F3' : '#ffeb3b');
            if(card.s === 'triangle') shape.style.borderBottomColor = color;
            else shape.style.backgroundColor = color;
            div.appendChild(shape);
            boardEl.appendChild(div);
        });
        document.getElementById('gh-p1-name').innerText = room.p1.name;
        document.getElementById('gh-p2-name').innerText = room.p2 ? room.p2.name : "대기 중...";
        if(room.status === 'WAITING' && room.p1.uid === myUid && room.p2) {
            document.getElementById('btn-gh-start').style.display = 'block';
        } else {
            document.getElementById('btn-gh-start').style.display = 'none';
        }
    }

    function startGameGH() {
        db.ref(`rooms/GH/${currentRoomId}`).update({status: 'PLAYING'});
    }
    // (이하 결합 세부 로직 생략 - 구조적 통합 위주)

</script>
</body>
</html>
