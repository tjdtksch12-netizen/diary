l(r,c,x){return x.status==='PLAYING'&&x.turn===myNum(x)&&!mrOcc(r,c,x)&&x.remaining>0&&arr(x.turnPlaced).length<3&&mrAdj(r,c,x,arr(x.turnPlaced))&&mrLineOK(r,c,x)}function mrPlace(r,c,x){if(!mrLegal(r,c,x))return;let g=x.grid||{},tp=arr(x.turnPlaced);g[r+','+c]={o:x.selected,owner:myNum(x)};tp.push({r,c,o:x.selected});db.ref('rooms/MR/'+curRoom).update({grid:g,turnPlaced:tp,remaining:x.remaining-1})}function mrUndo(){let x=window.lastRoom,g=x.grid||{},tp=arr(x.turnPlaced);tp.forEach(p=>delete g[p.r+','+p.c]);db.ref('rooms/MR/'+curRoom).update({grid:g,turnPlaced:[],remaining:x.remaining+tp.length})}function mrEnd(){let x=window.lastRoom;if(mrComplete(x))return endGame(myNum(x)===1?x.p1.uid:x.p2.uid,x);db.ref('rooms/MR/'+curRoom).update({turn:myNum(x)===1?2:1,turnPlaced:[]})}function mrImpossible(){let x=window.lastRoom,possible=mrCanComplete(x,65000),declarer=myNum(x),winner=possible?(declarer===1?x.p2.uid:x.p1.uid):(declarer===1?x.p1.uid:x.p2.uid);show(possible?'가능!':'불가능!');endGame(winner,x)}function mrConn(r,c,x){if(r===4&&c===0)return['E'];if(r===4&&c===8)return['W'];let t=x.grid&&x.grid[r+','+c];return t?CON[t.o]:[]}function mrHas(r,c,d,x){let [dr,dc]=DIR[d],nr=r+dr,nc=c+dc;return nr>=0&&nr<9&&nc>=0&&nc<9&&mrConn(nr,nc,x).includes(OP[d])}function mrComplete(x){let keys=Object.keys(x.grid||{});if(!keys.length)return false;let all=['4,0','4,8',...keys];for(let k of all){let [r,c]=k.split(',').map(Number);for(let d of mrConn(r,c,x))if(!mrHas(r,c,d,x))return false}let seen=new Set(),st=['4,0'];while(st.length){let k=st.pop();if(seen.has(k))continue;seen.add(k);let [r,c]=k.split(',').map(Number);for(let d of mrConn(r,c,x))if(mrHas(r,c,d,x)){let [dr,dc]=DIR[d];st.push((r+dr)+','+(c+dc))}}return all.every(k=>seen.has(k))}function mrCanComplete(x,limit){let req=new Set(Object.keys(x.grid||{})),max=Object.keys(x.grid||{}).length+(x.remaining||0),seen=new Set(),nodes=0,ok=false;function same(a,b){return a.length===b.length&&a.every(v=>b.includes(v))}function dir(a,b){let dr=b[0]-a[0],dc=b[1]-a[1];return dr===-1?'N':dr===1?'S':dc===-1?'W':'E'}function orientOK(seq){for(let i=0;i<seq.length;i++){let k=seq[i],t=x.grid&&x.grid[k];if(!t)continue;let [r,c]=k.split(',').map(Number),ds=[];if(i===0)ds.push('W');else ds.push(dir(seq[i-1].split(',').map(Number),[r,c]));if(i===seq.length-1)ds.push('E');else ds.push(dir([r,c],seq[i+1].split(',').map(Number)));if(!same(ds,CON[t.o]))return false}return true}function dfs(r,c,seq){if(ok||nodes++>limit)return;if(r<0||r>=9||c<1||c>7)return;let k=r+','+c;if(seen.has(k)||seq.length>max)return;seen.add(k);seq.push(k);if(r===4&&c===7){let has=true;req.forEach(v=>{if(!seen.has(v))has=false});if(has&&orientOK(seq))ok=true}let man=Math.abs(r-4)+Math.abs(c-7);if(seq.length+man<=max)[[0,1],[1,0],[-1,0],[0,-1]].forEach(d=>dfs(r+d[0],c+d[1],seq));seq.pop();seen.delete(k)}dfs(4,1,[]);return ok}
function maybeBot(r){if(!r.p2||r.p2.uid!=='BOT'||r.status!=='PLAYING'||botBusy)return;if(curType==='BW'&&!r.p2Submit){botBusy=true;setTimeout(()=>{let cards=arr(r.p2Cards);db.ref('rooms/BW/'+curRoom+'/p2Submit').set({card:cards[Math.floor(Math.random()*cards.length)],color:Math.random()<.5?'black':'white',ts:Date.now()});botBusy=false},900)}if(curType==='MR'&&r.turn===2){botBusy=true;setTimeout(()=>{let mv=mrBotMove(r);if(mv){let g=r.grid||{};mv.forEach(p=>g[p.r+','+p.c]={o:p.o,owner:2});db.ref('rooms/MR/'+curRoom).update({grid:g,remaining:r.remaining-mv.length,turn:1,turnPlaced:[]})}botBusy=false},1200)}}function mrBotMove(r){let moves=[];for(let rr=0;rr<9;rr++)for(let c=0;c<9;c++)if(!mrOcc(rr,c,r)&&mrAdj(rr,c,r,[]))moves.push({r:rr,c,o:RO[Math.floor(Math.random()*RO.length)]});return moves.length?[moves[Math.floor(Math.random()*moves.length)]]:null}
