<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지니어스 게임 센터 - 온라인</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

:root {
    --red: #8b0000;
    --gold: #ffd700;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Jua', sans-serif;
    user-select: none;
}

body {
    background: var(--red);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

.screen {
    display: none;
    width: 100%;
    max-width: 1200px;
    padding: 20px;
    flex-direction: column;
    align-items: center;
}

.active {
    display: flex !important;
}

.btn {
    padding: 12px 25px;
    font-size: 1.2rem;
    background: var(--gold);
    color: var(--red);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px;
    transition: .2s;
    box-shadow: 2px 2px 5px rgba(0,0,0,.3);
}

.btn:hover:not(:disabled) {
    background: #ffea00;
    transform: scale(1.05);
}

.btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    color: #666;
    box-shadow: none;
}

.input-box {
    padding: 15px;
    font-size: 1.5rem;
    border-radius: 8px;
    border: none;
    text-align: center;
    width: 300px;
    margin-bottom: 15px;
}

.card {
    background: rgba(0,0,0,.5);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
    border: 2px solid var(--gold);
    cursor: pointer;
    transition: .3s;
    margin: 10px;
}

.card:hover {
    background: rgba(255,215,0,.2);
    transform: translateY(-8px);
}

.room-box {
    width: 100%;
    max-width: 600px;
    background: rgba(0,0,0,.4);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.room-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,.1);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.panel {
    background: rgba(0,0,0,.6);
    padding: 15px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 140px;
}

/* 결합 */
#timer-bar {
    width: 100%;
    max-width: 600px;
    height: 15px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin: 10px 0;
    border: 2px solid #222;
}

#timer-fill-gh {
    width: 100%;
    height: 100%;
    background: #4CAF50;
    transition: width 1s linear;
}

.gh-wrap {
    position: relative;
}

.gh-grid {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 10px;
    background: #5c0000;
    padding: 15px;
    border-radius: 10px;
    border: 3px solid #3a0000;
}

.gh-card {
    width: 110px;
    height: 110px;
    border: 3px solid #fff;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    background: #000;
    transition: .1s;
}

.gh-card.sel {
    border: 6px solid var(--gold);
    box-shadow: 0 0 25px var(--gold), inset 0 0 15px rgba(255,215,0,.3);
    transform: scale(1.08);
}

.gh-card.opponent-sel {
    border: 6px solid #2196F3;
    box-shadow: 0 0 25px #2196F3, inset 0 0 15px rgba(33,150,243,.35);
    transform: scale(1.08);
}

.gh-card.correct-sel {
    border: 6px solid #4CAF50 !important;
    box-shadow: 0 0 25px #4CAF50, inset 0 0 15px rgba(76,175,80,.5) !important;
    transform: scale(1.08);
}

.gh-card.wrong-sel {
    border: 6px solid #f44336 !important;
    box-shadow: 0 0 25px #f44336, inset 0 0 15px rgba(244,67,54,.5) !important;
    transform: scale(1.08);
}

#gh-cover {
    position: absolute;
    inset: 0;
    background: #111;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
}

.s-circle {
    width: 58px;
    height: 58px;
    border-radius: 50%;
}

.s-square {
    width: 58px;
    height: 58px;
}

.s-triangle {
    width: 0;
    height: 0;
    border-left: 29px solid transparent;
    border-right: 29px solid transparent;
    border-bottom: 58px solid;
}

.bg-black {
    background: #111;
}

.bg-white {
    background: #eee;
}

.bg-gray {
    background: #777;
}

#gh-alert-box {
    display: none;
    font-size: 1.6rem;
    font-weight: bold;
    margin-bottom: 10px;
    padding: 10px 20px;
    border-radius: 10px;
    background: rgba(0,0,0,0.8);
    text-align: center;
    min-width: 300px;
}

.gh-call-effect {
    animation: ghPulse .45s ease-in-out 3;
}

@keyframes ghPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* 십이장기 */
.tj-board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(4, 100px);
    gap: 5px;
    background: #c59b6d;
    padding: 15px;
    border: 6px solid #5a3a22;
    border-radius: 10px;
    box-shadow: inset 0 0 20px rgba(0,0,0,.5);
}

.tj-cell {
    width: 100px;
    height: 100px;
    background: #e6c280;
    border: 1px solid #c29d62;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: .2s;
}

.tj-cell.sel {
    background: #fffacd;
    box-shadow: inset 0 0 25px var(--gold);
}

.piece {
    width: 88px;
    height: 88px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 4px solid;
    background: #fff;
    box-shadow: 2px 2px 5px rgba(0,0,0,.5);
    cursor: pointer;
}

.piece.p1 {
    border-color: #c62828;
}

.piece.p2 {
    border-color: #2e7d32;
    transform: rotate(180deg);
}

.piece.cap {
    width: 68px;
    height: 68px;
    margin: 4px;
    border-width: 3px;
    transform: none !important;
}

.ag {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-items: center;
    font-size: 1.2rem;
}

.ch {
    font-size: 2.1rem;
    font-weight: bold;
}

.piece.p1 .ag {
    color: #ef9a9a;
}

.piece.p1 .ch {
    color: #c62828;
}

.piece.p2 .ag {
    color: #a5d6a7;
}

.piece.p2 .ch {
    color: #2e7d32;
}

/* 러시아 장기 */
.rg-board {
    display: grid;
    grid-template-columns: repeat(3, 130px);
    grid-template-rows: repeat(3, 130px);
    gap: 10px;
    background: #81c784;
    padding: 15px;
    border: 5px solid #2e7d32;
    border-radius: 10px;
}

.rg-cell {
    width: 130px;
    height: 130px;
    background: #a5d6a7;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    transition: .2s;
    cursor: pointer;
}

.rg-cell:hover {
    background: #b9e6bb;
}

.rg-hand-box {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: rgba(0,0,0,.3);
    padding: 15px;
    border-radius: 10px;
    width: 270px;
    justify-content: center;
    align-items: center;
    min-height: 140px;
}

.rg-piece {
    border-radius: 50%;
    position: absolute;
    border: 3px solid #fff;
    box-shadow: 3px 3px 8px rgba(0,0,0,.5);
    cursor: pointer;
    transition: transform 0.2s;
}

.rg-piece:hover {
    transform: scale(1.05);
}

.rg-piece.p1 {
    background: #f44336;
}

.rg-piece.p2 {
    background: #2196F3;
}

.sz1 {
    width: 50px;
    height: 50px;
}

.sz2 {
    width: 90px;
    height: 90px;
}

.sz3 {
    width: 124px;
    height: 124px;
}

.hand-item {
    position: relative;
    width: 62px;
    height: 62px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="s-login" class="screen active" style="justify-content:center;height:100vh;">
    <h1 style="font-size:3.8rem;color:var(--gold);margin-bottom:20px;">THE GENIUS ONLINE</h1>
    <p style="margin-bottom:28px;text-align:center;font-size:1.1rem;">
        닉네임과 4자리 PIN을 입력하세요.<br>
        처음이면 자동으로 계정이 만들어집니다.
    </p>
    <input id="lid" type="text" class="input-box" placeholder="닉네임 (최대 8자)" maxlength="8">
    <input id="lpw" type="password" class="input-box" placeholder="비밀번호 숫자 4자리" maxlength="4" onkeypress="if(event.keyCode==13)login()">
    <button class="btn" style="padding:15px 50px;font-size:1.5rem;" onclick="login()">접속하기</button>
</div>

<div id="s-home" class="screen" style="justify-content:center;height:100vh;">
    <div id="welcome" style="font-size:1.4rem;color:#ccc;margin-bottom:8px;"></div>
    <h1 style="font-size:3.2rem;color:var(--gold);margin-bottom:28px;">어떤 게임을 하시겠습니까?</h1>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;">
        <div class="card" onclick="goLobby('GH')">
            <h2 style="font-size:2.3rem;color:#4CAF50;">결! 합!</h2>
            <p style="margin-top:8px;">9장 카드에서 합을 찾는 두뇌 게임</p>
        </div>
        <div class="card" onclick="goLobby('TJ')">
            <h2 style="font-size:2.3rem;color:#ffeb3b;">십이장기</h2>
            <p style="margin-top:8px;">3×4 보드, 왕 잡기 또는 끝줄 돌파!</p>
        </div>
        <div class="card" onclick="goLobby('RG')">
            <h2 style="font-size:2.3rem;color:#ff9800;">러시아 장기</h2>
            <p style="margin-top:8px;">큰 말로 덮어씌우는 3목 게임</p>
        </div>
    </div>
    <button class="btn" onclick="logout()" style="margin-top:28px;background:#555;color:#fff;">로그아웃</button>
</div>

<div id="s-lobby" class="screen">
    <h1 id="lobby-title" style="font-size:2.8rem;color:var(--gold);">로비</h1>
    <div style="margin:18px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="btn" onclick="createRoom(false)" style="background:#4CAF50;color:#fff;">+ 유저와 대결 (방 만들기)</button>
        <button class="btn" onclick="createRoom(true)" style="background:#2196F3;color:#fff;">🤖 AI와 연습하기</button>
    </div>
    <div class="room-box">
        <h3 style="margin-bottom:12px;color:var(--gold);">대기 중인 방</h3>
        <div id="room-list"></div>
    </div>
    <div class="room-box" style="margin-top:18px;background:rgba(0,0,0,.7);">
        <h3 style="color:var(--gold);margin-bottom:8px;">
            🏆 명예의 전당
            <span style="font-size:.9rem;color:#ccc;">(내 전적: <span id="my-rec"></span>)</span>
        </h3>
        <div id="rank-list"></div>
    </div>
    <button class="btn" onclick="goBackHome()" style="margin-top:18px;background:#555;color:#fff;">← 홈으로</button>
</div>

<div id="s-gh" class="screen">
    <h2 id="gh-round" style="color:var(--gold);font-size:1.9rem;">ROUND 1 / 5</h2>
    <div id="timer-bar"><div id="timer-fill-gh"></div></div>

    <div id="gh-alert-box"></div>
    <div id="gh-status" style="font-size:1.4rem;margin-bottom:10px;"></div>

    <div style="display:flex;gap:28px;align-items:center;flex-wrap:wrap;justify-content:center;">
        <div class="panel">
            <div id="gh-n1" style="color:#4CAF50;font-size:1.1rem;">P1</div>
            <div id="gh-s1" style="font-size:3rem;color:var(--gold);">0</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;">
            <div class="gh-wrap">
                <div class="gh-grid" id="gh-board"></div>
                <div id="gh-cover">
                    <span style="font-size:3.5rem;">🔒</span>
                    <span style="color:#ddd;font-size:1.6rem;margin-top:8px;">방장이 시작하면 공개됩니다</span>
                </div>
            </div>
            <div style="margin-top:12px;">찾은 합: <span id="gh-found" style="color:#ffeb3b;">0</span>개</div>
        </div>

        <div class="panel">
            <div id="gh-n2" style="color:#2196F3;font-size:1.1rem;">P2</div>
            <div id="gh-s2" style="font-size:3rem;color:var(--gold);">0</div>
        </div>
    </div>

    <div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        <button class="btn" id="gh-start" style="display:none;background:#ff9800;color:#fff;padding:14px 38px;font-size:1.4rem;" onclick="startGame()">🚀 시작</button>
        <button class="btn" id="gh-hap" onclick="callHap()">합!</button>
        <button class="btn" id="gh-gyul" onclick="callGyul()">결!</button>
        <button class="btn" onclick="leaveGame()" style="background:#555;color:#fff;">로비로</button>
    </div>
</div>

<div id="s-tj" class="screen">
    <h2 style="color:var(--gold);font-size:1.9rem;margin-bottom:4px;">십이장기</h2>
    <div id="tj-status" style="font-size:1.4rem;margin-bottom:8px;"></div>
    <button class="btn" id="tj-start" style="display:none;margin-bottom:8px;background:#ff9800;color:#fff;padding:10px 30px;font-size:1.4rem;" onclick="startGame()">🚀 시작</button>

    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div style="display:flex;flex-direction:column;align-items:center;width:440px;">
            <div id="tj-n2" style="background:#2e7d32;padding:5px 14px;border-radius:5px;width:100%;text-align:center;margin-bottom:4px;">P2 (GREEN)</div>
            <div id="tj-h2" style="display:flex;flex-wrap:wrap;gap:4px;background:rgba(0,0,0,.3);padding:8px;border-radius:8px;min-height:78px;width:100%;justify-content:center;"></div>
        </div>

        <div class="tj-board" id="tj-board"></div>

        <div style="display:flex;flex-direction:column;align-items:center;width:440px;">
            <div id="tj-h1" style="display:flex;flex-wrap:wrap;gap:4px;background:rgba(0,0,0,.3);padding:8px;border-radius:8px;min-height:78px;width:100%;justify-content:center;margin-bottom:4px;"></div>
            <div id="tj-n1" style="background:#c62828;padding:5px 14px;border-radius:5px;width:100%;text-align:center;">P1 (RED)</div>
        </div>
    </div>

    <button class="btn" onclick="leaveGame()" style="margin-top:14px;background:#555;color:#fff;">로비로</button>
</div>

<div id="s-rg" class="screen">
    <h2 style="color:var(--gold);font-size:1.9rem;margin-bottom:4px;">러시아 장기</h2>
    <div id="rg-status" style="font-size:1.4rem;margin-bottom:12px;"></div>

    <div style="display:flex;gap:36px;align-items:center;flex-wrap:wrap;justify-content:center;">
        <div style="display:flex;flex-direction:column;align-items:center;">
            <div id="rg-n1" style="color:#f44336;margin-bottom:8px;font-size:1.1rem;font-weight:bold;">P1 (RED)</div>
            <div class="rg-hand-box" id="rg-h1"></div>
        </div>

        <div class="rg-board" id="rg-board"></div>

        <div style="display:flex;flex-direction:column;align-items:center;">
            <div id="rg-n2" style="color:#2196F3;margin-bottom:8px;font-size:1.1rem;font-weight:bold;">P2 (BLUE)</div>
            <div class="rg-hand-box" id="rg-h2"></div>
        </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center;">
        <button class="btn" id="rg-start" style="display:none;background:#ff9800;color:#fff;padding:14px 38px;font-size:1.4rem;" onclick="startGame()">🚀 시작</button>
        <button class="btn" onclick="leaveGame()" style="background:#555;color:#fff;">로비로</button>
    </div>
</div>

<script>
/* Firebase */
const firebaseConfig = {
    apiKey: "AIzaSyD1y7hpto_WOkwB_ia35epFfe3UjLbetCw",
    authDomain: "game-36d00.firebaseapp.com",
    databaseURL: "https://game-36d00-default-rtdb.firebaseio.com",
    projectId: "game-36d00",
    storageBucket: "game-36d00.firebasestorage.app",
    messagingSenderId: "614344822476",
    appId: "1:614344822476:web:5aa599268660fe7ed5fc69"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 전역 */
let myUid = null;
let myName = null;
let curType = null;
let curRoom = null;

let timerIv = null;
let botBusy = false;
let endHandled = false;

let gameRef = null;
let gameCb = null;
let lobbyRef = null;
let lobbyCb = null;

let seenActionId = null;
let seenHapTurnId = null;
let actionTimeout = null;

/* 공통 */
function go(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toArr(v) {
    if (!v) return [];
    if (Array.isArray(v)) return v;
    return Object.values(v);
}

function cleanGame() {
    if (gameRef && gameCb) gameRef.off('value', gameCb);
    gameRef = null;
    gameCb = null;
    botBusy = false;
    endHandled = false;
    stopTimer();
    clearTimeout(actionTimeout);
    seenActionId = null;
    seenHapTurnId = null;
}

function cleanLobby() {
    if (lobbyRef && lobbyCb) lobbyRef.off('value', lobbyCb);
    lobbyRef = null;
    lobbyCb = null;
}

function leaveGame() {
    cleanGame();
    go('s-lobby');
}

function goBackHome() {
    cleanLobby();
    go('s-home');
}

/* 로그인 */
function login() {
    const id = document.getElementById('lid').value.trim();
    const pw = document.getElementById('lpw').value.trim();

    if (!id || !pw) return alert('닉네임과 비밀번호를 입력하세요.');
    if (pw.length !== 4 || isNaN(pw)) return alert('비밀번호는 숫자 4자리여야 합니다.');

    db.ref('users/' + id).once('value', snap => {
        if (snap.exists()) {
            if (snap.val().pin !== pw) return alert('비밀번호가 틀렸습니다!');
        } else {
            db.ref('users/' + id).set({
                pin: pw,
                wins: 0,
                losses: 0
            });
            alert('신규 계정이 생성되었습니다!');
        }

        myUid = id;
        myName = id;

        document.getElementById('welcome').innerText = myName + '님, 환영합니다!';
        go('s-home');
        updateRank();
    });
}

function logout() {
    myUid = null;
    myName = null;
    document.getElementById('lpw').value = '';
    go('s-login');
}

function updateRank() {
    db.ref('users').on('value', snap => {
        let users = [];

        snap.forEach(c => {
            if (c.key !== 'admin_placeholder') {
                users.push({
                    ...c.val(),
                    id: c.key
                });
            }
        });

        const me = users.find(u => u.id === myUid);
        const rec = document.getElementById('my-rec');

        if (me && rec) {
            rec.innerText = (me.wins || 0) + '승 ' + (me.losses || 0) + '패';
        }

        users.sort((a, b) => (b.wins || 0) - (a.wins || 0));

        const rl = document.getElementById('rank-list');
        if (!rl) return;

        rl.innerHTML = '';

        users.slice(0, 5).forEach((u, i) => {
            rl.innerHTML += `
                <div style="display:flex;justify-content:space-between;padding:5px;border-bottom:1px solid #555;font-size:1.1rem;">
                    <span>${i + 1}위. ${u.id}</span>
                    <span style="color:#ffeb3b">${u.wins || 0}승 ${u.losses || 0}패</span>
                </div>`;
        });
    });
}

/* 로비 */
function goLobby(type) {
    cleanLobby();
    curType = type;

    const names = {
        GH: '결! 합!',
        TJ: '십이장기',
        RG: '러시아 장기'
    };

    document.getElementById('lobby-title').innerText = names[type] + ' 로비';
    go('s-lobby');

    lobbyRef = db.ref('rooms/' + type);

    lobbyCb = snap => {
        const rl = document.getElementById('room-list');
        if (!rl) return;

        rl.innerHTML = '';
        let any = false;

        snap.forEach(c => {
            const r = c.val();

            if (r.status === 'WAITING' && !r.isPractice && r.p1) {
                any = true;
                rl.innerHTML += `
                    <div class="room-item">
                        <span><b>${r.p1.name || '?'}</b>님의 방</span>
                        <button class="btn" onclick="joinRoom('${c.key}')">입장</button>
                    </div>`;
            }
        });

        if (!any) {
            rl.innerHTML = '<p style="color:#ccc;text-align:center;">대기 중인 방이 없습니다.</p>';
        }
    };

    lobbyRef.on('value', lobbyCb);
}

function createRoom(isPractice) {
    const id = Math.random().toString(36).substr(2, 6).toUpperCase();

    const base = {
        hostName: myName,
        status: 'WAITING',
        isPractice,
        winnerName: null,
        p1: {
            uid: myUid,
            name: myName,
            score: 0
        }
    };

    if (isPractice) {
        base.p2 = {
            uid: 'BOT',
            name: '🤖 컴퓨터',
            score: 0
        };
    }

    if (curType === 'GH') {
        Object.assign(base, {
            round: 1,
            board: makeGHBoard(),
            foundHaps: [],
            hapTurn: null,
            lastAction: null
        });
    }

    if (curType === 'TJ') {
        Object.assign(base, {
            turn: 1,
            p1Hand: [],
            p2Hand: [],
            selectedPiece: null,
            board: [
                [{ t: 'jang', o: 2 }, { t: 'wang', o: 2 }, { t: 'sang', o: 2 }],
                [null, { t: 'ja', o: 2 }, null],
                [null, { t: 'ja', o: 1 }, null],
                [{ t: 'sang', o: 1 }, { t: 'wang', o: 1 }, { t: 'jang', o: 1 }]
            ]
        });
    }

    if (curType === 'RG') {
        Object.assign(base, {
            turn: 1,
            board: {
                0: [], 1: [], 2: [],
                3: [], 4: [], 5: [],
                6: [], 7: [], 8: []
            },
            p1Hand: [1, 1, 2, 2, 3, 3],
            p2Hand: [1, 1, 2, 2, 3, 3],
            selectedPiece: null
        });
    }

    db.ref('rooms/' + curType + '/' + id).set(base);
    enterRoom(id);
}

function joinRoom(id) {
    db.ref('rooms/' + curType + '/' + id).once('value', snap => {
        const r = snap.val();

        if (!r) return alert('방이 없어졌습니다.');

        if (!r.p2 && r.p1.uid !== myUid) {
            db.ref('rooms/' + curType + '/' + id + '/p2').set({
                uid: myUid,
                name: myName,
                score: 0
            });
        }

        enterRoom(id);
    });
}

function enterRoom(id) {
    cleanGame();
    cleanLobby();

    curRoom = id;
    go('s-' + curType.toLowerCase());

    gameRef = db.ref('rooms/' + curType + '/' + id);

    gameCb = snap => {
        const room = snap.val();

        if (!room) {
            cleanGame();
            alert('방이 삭제되었습니다.');
            go('s-lobby');
            return;
        }

        if (curType === 'GH') renderGH(room);
        if (curType === 'TJ') renderTJ(room);
        if (curType === 'RG') renderRG(room);

        if (room.status === 'FINISHED' && !endHandled) {
            endHandled = true;
            stopTimer();

            const msg = (room.winnerName ? '🏆 ' + room.winnerName + ' 승리!\n' : '') + '잠시 후 로비로 이동합니다.';

            setTimeout(() => {
                alert(msg);
                cleanGame();

                if (room.p1.uid === myUid) {
                    db.ref('rooms/' + curType + '/' + id).remove();
                }

                goLobby(curType);
            }, 1500);
        }

        if (room.status === 'PLAYING' && room.isPractice && !botBusy) {
            if (curType === 'GH' && !room.hapTurn) botGH(room);
            if (curType === 'TJ' && room.turn === 2) botTJ(room);
            if (curType === 'RG' && room.turn === 2) botRG(room);
        }
    };

    gameRef.on('value', gameCb);
}

function startGame() {
    db.ref('rooms/' + curType + '/' + curRoom).update({
        status: 'PLAYING'
    });
}

function endGame(winnerUid, room) {
    if (room.status === 'FINISHED') return;

    const wname =
        winnerUid === 'BOT'
            ? '🤖 컴퓨터'
            : winnerUid === room.p1.uid
                ? room.p1.name || 'P1'
                : room.p2
                    ? room.p2.name || 'P2'
                    : '?';

    db.ref('rooms/' + curType + '/' + curRoom).update({
        status: 'FINISHED',
        winnerName: wname
    });

    if (!room.isPractice && winnerUid === myUid && room.p2) {
        db.ref('users/' + myUid).once('value', s => {
            db.ref('users/' + myUid).update({
                wins: (s.val().wins || 0) + 1
            });
        });

        const loser = room.p2.uid !== myUid ? room.p2.uid : room.p1.uid;

        if (loser !== 'BOT') {
            db.ref('users/' + loser).once('value', s => {
                db.ref('users/' + loser).update({
                    losses: (s.val().losses || 0) + 1
                });
            });
        }
    }
}

/* 결합 */
function makeGHBoard() {
    const sh = ['circle', 'triangle', 'square'];
    const co = ['red', 'blue', 'yellow'];
    const bg = ['black', 'white', 'gray'];

    const d = [];

    sh.forEach(s => {
        co.forEach(c => {
            bg.forEach(b => {
                d.push({ s, c, b });
            });
        });
    });

    return d.sort(() => Math.random() - .5).slice(0, 9);
}

function validHap(c) {
    return ['s', 'c', 'b'].every(a =>
        (c[0][a] === c[1][a] && c[1][a] === c[2][a]) ||
        (c[0][a] !== c[1][a] && c[0][a] !== c[2][a] && c[1][a] !== c[2][a])
    );
}

function renderGH(room) {
    document.getElementById('gh-round').innerText = 'ROUND ' + room.round + ' / 5';
    document.getElementById('gh-found').innerText = toArr(room.foundHaps).length;

    const playing = room.status === 'PLAYING';
    document.getElementById('gh-cover').style.display = playing ? 'none' : 'flex';

    if (room.hapTurn && room.hapTurn.id !== seenHapTurnId) {
        seenHapTurnId = room.hapTurn.id;

        const al = document.getElementById('gh-alert-box');

        if (al) {
            if (room.hapTurn.uid === myUid) {
                al.innerText = '내가 합을 외쳤습니다! 30초 안에 3장을 선택하세요.';
                al.style.color = '#ffd700';
            } else {
                al.innerText = room.hapTurn.name + '님이 합을 외쳤습니다!';
                al.style.color = '#2196F3';
            }

            al.style.display = 'block';
            al.classList.remove('gh-call-effect');
            void al.offsetWidth;
            al.classList.add('gh-call-effect');

            clearTimeout(actionTimeout);
            actionTimeout = setTimeout(() => {
                al.style.display = 'none';
                al.classList.remove('gh-call-effect');
            }, 2200);
        }
    }

    if (room.lastAction && room.lastAction.id !== seenActionId) {
        seenActionId = room.lastAction.id;

        const al = document.getElementById('gh-alert-box');
        al.innerText = room.lastAction.text;
        al.style.color = room.lastAction.ok ? '#4CAF50' : '#f44336';
        al.style.display = 'block';

        clearTimeout(actionTimeout);

        actionTimeout = setTimeout(() => {
            al.style.display = 'none';
            document.querySelectorAll('.gh-card').forEach(c => {
                c.classList.remove('correct-sel', 'wrong-sel');
            });
        }, 2500);
    }

    const la = room.lastAction;
    const showResult =
        la &&
        la.id === seenActionId &&
        document.getElementById('gh-alert-box').style.display === 'block';

    const selC =
        room.hapTurn && room.hapTurn.selectedCards
            ? toArr(room.hapTurn.selectedCards).map(Number)
            : [];

    const bEl = document.getElementById('gh-board');
    bEl.innerHTML = '';

    toArr(room.board).forEach((card, i) => {
        const d = document.createElement('div');
        let classes = 'gh-card bg-' + card.b;

        if (showResult && la.cards && la.cards.includes(i)) {
            classes += la.ok ? ' correct-sel' : ' wrong-sel';
        } else if (selC.includes(i)) {
            if (room.hapTurn && room.hapTurn.uid === myUid) {
                classes += ' sel';
            } else {
                classes += ' opponent-sel';
            }
        }

        d.className = classes;

        d.onclick = () => {
            if (!room.hapTurn || room.hapTurn.uid !== myUid) return;
            if (room.status !== 'PLAYING') return;

            let ns = [...selC];

            if (ns.includes(i)) {
                ns = ns.filter(x => x !== i);
            } else {
                if (ns.length >= 3) return;
                ns.push(i);
            }

            db.ref('rooms/GH/' + curRoom + '/hapTurn/selectedCards').set(ns);

            if (ns.length === 3) {
                setTimeout(() => checkGH(ns), 150);
            }
        };

        const sh = document.createElement('div');
        sh.className = 's-' + card.s;

        const col =
            card.c === 'red'
                ? '#f44336'
                : card.c === 'blue'
                    ? '#2196F3'
                    : '#ffeb3b';

        if (card.s === 'triangle') {
            sh.style.borderBottomColor = col;
        } else {
            sh.style.backgroundColor = col;
        }

        d.appendChild(sh);
        bEl.appendChild(d);
    });

    document.getElementById('gh-n1').innerText = room.p1.name;
    document.getElementById('gh-s1').innerText = room.p1.score || 0;

    if (room.p2) {
        document.getElementById('gh-n2').innerText = room.p2.name;
        document.getElementById('gh-s2').innerText = room.p2.score || 0;
    }

    const hap = !!room.hapTurn;

    document.getElementById('gh-hap').disabled = !playing || hap;
    document.getElementById('gh-gyul').disabled = !playing || hap;

    const stEl = document.getElementById('gh-status');
    const stBtn = document.getElementById('gh-start');

    if (!playing) {
        stBtn.style.display = room.p1.uid === myUid && room.p2 ? 'block' : 'none';

        stEl.innerText =
            room.status === 'FINISHED'
                ? room.winnerName
                    ? '🏆 ' + room.winnerName + ' 승리!'
                    : '게임 종료!'
                : room.p1.uid === myUid
                    ? room.p2
                        ? '시작 버튼을 누르세요'
                        : '상대 대기 중...'
                    : '방장 시작 대기 중...';
    } else {
        stBtn.style.display = 'none';
        stEl.innerText = hap ? room.hapTurn.name + '님이 합 찾는 중!' : '합! 또는 결!을 외치세요';

        if (hap) {
            startTimer(room.hapTurn.startTime, room.hapTurn.uid);
        } else {
            stopTimer();
        }
    }
}

function callHap() {
    const roomPath = 'rooms/GH/' + curRoom;

    db.ref(roomPath).transaction(room => {
        if (!room) return room;
        if (room.status !== 'PLAYING') return room;
        if (room.hapTurn) return room;

        const now = Date.now();

        room.hapTurn = {
            uid: myUid,
            name: myName,
            startTime: now,
            selectedCards: [],
            id: now + '_' + myUid
        };

        room.lastAction = {
            id: now + '_hapcall_' + myUid,
            text: myName + '님이 합을 외쳤습니다!',
            cards: [],
            ok: true,
            type: 'hapCall'
        };

        return room;
    }, (err, committed) => {
        if (err) {
            console.error(err);
            alert('합 선언 중 오류가 발생했습니다.');
            return;
        }

        if (!committed) {
            alert('이미 다른 플레이어가 합을 외쳤습니다!');
        }
    });
}

function checkGH(selection) {
    db.ref('rooms/GH/' + curRoom).once('value', snap => {
        const r = snap.val();

        if (!r || !r.hapTurn || r.hapTurn.uid !== myUid) return;

        const ba = toArr(r.board);
        const c = selection.map(i => ba[i]);

        if (!c[0] || !c[1] || !c[2]) return;

        const ok = validHap(c);
        const key = [...selection].sort((a, b) => a - b).join(',');
        const fh = toArr(r.foundHaps);
        const mk = r.p1.uid === myUid ? 'p1' : 'p2';

        const already = fh.includes(key);

        const action = {
            id: Date.now(),
            text: `${myName}: 합 ${ok && !already ? '정답 (+1점)' : already ? '이미 찾은 합 (-1점)' : '오답 (-1점)'}`,
            cards: selection,
            ok: ok && !already
        };

        if (already || !ok) {
            db.ref('rooms/GH/' + curRoom).update({
                hapTurn: null,
                [mk + '/score']: (r[mk].score || 0) - 1,
                lastAction: action
            });
        } else {
            fh.push(key);

            db.ref('rooms/GH/' + curRoom).update({
                hapTurn: null,
                foundHaps: fh,
                [mk + '/score']: (r[mk].score || 0) + 1,
                lastAction: action
            });
        }
    });
}

function callGyul() {
    db.ref('rooms/GH/' + curRoom).once('value', snap => {
        const r = snap.val();

        if (!r || r.status !== 'PLAYING') return;

        if (r.hapTurn) {
            alert('누군가 합을 찾는 중에는 결을 외칠 수 없습니다.');
            return;
        }

        const ba = toArr(r.board);
        const fh = toArr(r.foundHaps);

        let rem = 0;

        for (let i = 0; i < 7; i++) {
            for (let j = i + 1; j < 8; j++) {
                for (let k = j + 1; k < 9; k++) {
                    if (validHap([ba[i], ba[j], ba[k]]) && !fh.includes(i + ',' + j + ',' + k)) {
                        rem++;
                    }
                }
            }
        }

        const mk = r.p1.uid === myUid ? 'p1' : 'p2';
        const ok = rem === 0;

        const action = {
            id: Date.now(),
            text: `${myName}: 결 ${ok ? '정답 (+3점)' : '오답 (-1점)'}`,
            cards: [],
            ok
        };

        if (ok) {
            const newS = (r[mk].score || 0) + 3;

            if (r.round >= 5) {
                db.ref('rooms/GH/' + curRoom).update({
                    [mk + '/score']: newS,
                    lastAction: action
                });

                const p1f = mk === 'p1' ? newS : (r.p1.score || 0);
                const p2f = mk === 'p2' ? newS : (r.p2 ? r.p2.score || 0 : 0);

                endGame(p1f >= p2f ? r.p1.uid : r.p2.uid, r);
            } else {
                db.ref('rooms/GH/' + curRoom).update({
                    [mk + '/score']: newS,
                    round: r.round + 1,
                    board: makeGHBoard(),
                    foundHaps: [],
                    hapTurn: null,
                    lastAction: action
                });
            }
        } else {
            db.ref('rooms/GH/' + curRoom).update({
                [mk + '/score']: (r[mk].score || 0) - 1,
                lastAction: action
            });
        }
    });
}

function startTimer(startTime, hapUid) {
    clearInterval(timerIv);

    timerIv = setInterval(() => {
        const rem = 30 - Math.floor((Date.now() - startTime) / 1000);
        const fill = document.getElementById('timer-fill-gh');

        if (fill) {
            fill.style.width = Math.max(0, rem / 30 * 100) + '%';
        }

        if (rem <= 0) {
            clearInterval(timerIv);

            if (hapUid !== myUid) return;

            db.ref('rooms/GH/' + curRoom).once('value', s2 => {
                const r2 = s2.val();

                if (!r2 || !r2.hapTurn) return;

                const hk = r2.hapTurn.uid === r2.p1.uid ? 'p1' : 'p2';

                const action = {
                    id: Date.now(),
                    text: `${r2.hapTurn.name}: 시간 초과 (-1점)`,
                    cards: [],
                    ok: false
                };

                db.ref('rooms/GH/' + curRoom).update({
                    hapTurn: null,
                    [hk + '/score']: (r2[hk].score || 0) - 1,
                    lastAction: action
                });
            });
        }
    }, 1000);
}

function stopTimer() {
    clearInterval(timerIv);
    const f = document.getElementById('timer-fill-gh');
    if (f) f.style.width = '100%';
}

/* 십이장기 */
function getTJBoard(room) {
    let b = [];

    for (let r = 0; r < 4; r++) {
        let row = [];

        for (let c = 0; c < 3; c++) {
            row.push(room.board && room.board[r] && room.board[r][c] ? room.board[r][c] : null);
        }

        b.push(row);
    }

    return b;
}

function pieceHTML(t) {
    const ch = {
        wang: '王',
        jang: '將',
        sang: '相',
        ja: '子',
        hu: '侯'
    };

    const C = '<span class="ch">' + ch[t] + '</span>';

    const maps = {
        wang: ['↖','↑','↗','←',C,'→','↙','↓','↘'],
        jang: ['','↑','','←',C,'→','','↓',''],
        sang: ['↖','','↗','',C,'','↙','','↘'],
        ja: ['', '↑', '', '', C, '', '', '', ''],
        hu: ['↖','↑','↗','←',C,'→','','↓','']
    };

    return '<div class="ag">' + maps[t].map(x => '<div>' + x + '</div>').join('') + '</div>';
}

function renderTJ(room) {
    const myNum = room.p1.uid === myUid ? 1 : 2;

    document.getElementById('tj-n1').innerText = (room.p1.name || 'P1') + ' (RED)';
    document.getElementById('tj-n2').innerText = (room.p2 ? room.p2.name : '대기 중...') + ' (GREEN)';

    const stBtn = document.getElementById('tj-start');
    const stEl = document.getElementById('tj-status');

    if (room.status === 'WAITING') {
        const am = room.p1.uid === myUid;

        stBtn.style.display = am && room.p2 ? 'block' : 'none';
        stEl.innerText = am ? room.p2 ? '시작 버튼을 누르세요!' : '상대 대기 중...' : '방장 대기 중...';
    } else if (room.status === 'FINISHED') {
        stBtn.style.display = 'none';
        stEl.innerText = room.winnerName ? '🏆 ' + room.winnerName + ' 승리!' : '게임 종료!';
    } else {
        stBtn.style.display = 'none';
        stEl.innerText = room.turn === myNum ? '✅ 내 차례!' : '상대방 차례...';
    }

    const selP = room.selectedPiece;
    const safeBoard = getTJBoard(room);

    const bEl = document.getElementById('tj-board');
    bEl.innerHTML = '';

    safeBoard.forEach((row, r) => {
        row.forEach((cell, c) => {
            const div = document.createElement('div');

            div.className =
                'tj-cell' +
                (selP && selP.origin === 'board' && selP.r === r && selP.c === c ? ' sel' : '');

            if (cell) {
                const p = document.createElement('div');
                p.className = 'piece p' + cell.o;
                p.innerHTML = pieceHTML(cell.t);
                div.appendChild(p);
            }

            div.onclick = () => handleTJ(r, c, room, safeBoard, selP);
            bEl.appendChild(div);
        });
    });

    drawHand('tj-h1', toArr(room.p1Hand), 1, room, selP);
    drawHand('tj-h2', toArr(room.p2Hand), 2, room, selP);
}

function drawHand(id, hand, owner, room, selP) {
    const el = document.getElementById(id);
    el.innerHTML = '';

    const myNum = room.p1.uid === myUid ? 1 : 2;

    hand.forEach((type, idx) => {
        const p = document.createElement('div');

        p.className = 'piece cap p' + owner;
        p.innerHTML = pieceHTML(type);

        if (selP && selP.origin === 'hand' && selP.owner === owner && selP.handIdx === idx) {
            p.style.borderColor = 'var(--gold)';
            p.style.boxShadow = '0 0 12px var(--gold)';
        }

        if (owner === myNum) {
            p.onclick = () => {
                if (room.turn === myNum && room.status === 'PLAYING') {
                    db.ref('rooms/TJ/' + curRoom + '/selectedPiece').set({
                        origin: 'hand',
                        type,
                        owner,
                        handIdx: idx
                    });
                }
            };
        }

        el.appendChild(p);
    });
}

function handleTJ(r, c, room, board, selP) {
    const myNum = room.p1.uid === myUid ? 1 : 2;

    if (room.turn !== myNum || room.status !== 'PLAYING') return;

    const target = board[r][c];

    if (selP && selP.origin === 'hand' && selP.owner === myNum) {
        if (!target && canTJDrop(board, r, c, selP.type, myNum)) {
            const nb = cloneTJBoard(board);

            nb[r][c] = {
                t: selP.type,
                o: myNum
            };

            const hk = myNum === 1 ? 'p1Hand' : 'p2Hand';
            const nh = toArr(room[hk]).filter((_, i) => i !== selP.handIdx);

            db.ref('rooms/TJ/' + curRoom).update({
                board: nb,
                nh,
                turn: myNum === 1 ? 2 : 1,
                selectedPiece: null
            });
        } else {
            db.ref('rooms/TJ/' + curRoom + '/selectedPiece').set(null);
        }

        return;
    }

    if (target && target.o === myNum) {
        db.ref('rooms/TJ/' + curRoom + '/selectedPiece').set({
            origin: 'board',
            r,
            c,
            type: target.t,
            owner: myNum
        });
        return;
    }

    if (selP && selP.origin === 'board' && selP.owner === myNum) {
        if (!canTJMove(board, selP.r, selP.c, r, c, myNum)) {
            db.ref('rooms/TJ/' + curRoom + '/selectedPiece').set(null);
            return;
        }

        const nb = cloneTJBoard(board);
        const nP1 = toArr(room.p1Hand);
        const nP2 = toArr(room.p2Hand);

        if (target && target.o !== myNum && target.t === 'wang') {
            nb[r][c] = {
                t: selP.type,
                o: myNum
            };
            nb[selP.r][selP.c] = null;

            db.ref('rooms/TJ/' + curRoom).update({
                board: nb,
                p1Hand: nP1,
                p2Hand: nP2,
                selectedPiece: null
            });

            return endGame(myUid, room);
        }

        if (target && target.o !== myNum) {
            const cap = target.t === 'hu' ? 'ja' : target.t;
            (myNum === 1 ? nP1 : nP2).push(cap);
        }

        let mt = selP.type;

        if (mt === 'ja' && ((myNum === 1 && r === 0) || (myNum === 2 && r === 3))) {
            mt = 'hu';
        }

        nb[r][c] = {
            t: mt,
            o: myNum
        };
        nb[selP.r][selP.c] = null;

        db.ref('rooms/TJ/' + curRoom).update({
            board: nb,
            p1Hand: nP1,
            p2Hand: nP2,
            turn: myNum === 1 ? 2 : 1,
            selectedPiece: null
        });

        if (mt === 'wang' && ((myNum === 1 && r === 0) || (myNum === 2 && r === 3))) {
            if (!isTJKingInCheck(nb, myNum)) {
                endGame(myUid, room);
            }
        }
    }
}

function validTJ(sr, sc, tr, tc, t, o) {
    const dr = tr - sr;
    const dc = tc - sc;
    const adr = Math.abs(dr);
    const adc = Math.abs(dc);

    if (adr === 0 && adc === 0) return false;

    if (t === 'wang') return adr <= 1 && adc <= 1;
    if (t === 'jang') return (adr === 1 && adc === 0) || (adr === 0 && adc === 1);
    if (t === 'sang') return adr === 1 && adc === 1;
    if (t === 'ja') return dc === 0 && dr === (o === 1 ? -1 : 1);

    if (t === 'hu') {
        return adr <= 1 &&
            adc <= 1 &&
            !(o === 1 && dr === 1 && adc === 1) &&
            !(o === 2 && dr === -1 && adc === 1);
    }

    return false;
}

function cloneTJBoard(board) {
    return board.map(row => row.map(cell => cell ? { ...cell } : null));
}

function findTJKing(board, owner) {
    for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 3; c++) {
            const p = board[r][c];

            if (p && p.o === owner && p.t === 'wang') {
                return { r, c };
            }
        }
    }

    return null;
}

function isTJKingInCheck(board, owner) {
    const king = findTJKing(board, owner);

    if (!king) return true;

    const enemy = owner === 1 ? 2 : 1;

    for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 3; c++) {
            const p = board[r][c];

            if (!p || p.o !== enemy) continue;

            if (validTJ(r, c, king.r, king.c, p.t, enemy)) {
                return true;
            }
        }
    }

    return false;
}

function canTJMove(board, sr, sc, tr, tc, owner) {
    const piece = board[sr][sc];

    if (!piece || piece.o !== owner) return false;

    const target = board[tr][tc];

    if (target && target.o === owner) return false;
    if (!validTJ(sr, sc, tr, tc, piece.t, owner)) return false;

    const nb = cloneTJBoard(board);

    let mt = piece.t;

    if (mt === 'ja' && ((owner === 1 && tr === 0) || (owner === 2 && tr === 3))) {
        mt = 'hu';
    }

    nb[tr][tc] = {
        t: mt,
        o: owner
    };

    nb[sr][sc] = null;

    if (isTJKingInCheck(nb, owner)) return false;

    return true;
}

function canTJDrop(board, r, c, type, owner) {
    if (board[r][c]) return false;

    const nb = cloneTJBoard(board);

    nb[r][c] = {
        t: type,
        o: owner
    };

    if (isTJKingInCheck(nb, owner)) return false;

    return true;
}

/* 러시아 장기 */
function getRGBoard(room) {
    let b = [];

    for (let i = 0; i < 9; i++) {
        b.push(room.board && room.board[i] ? toArr(room.board[i]) : []);
    }

    return b;
}

function renderRG(room) {
    const myNum = room.p1.uid === myUid ? 1 : 2;
    const isT = room.status === 'PLAYING' && room.turn === myNum;

    document.getElementById('rg-n1').innerText = (room.p1.name || 'P1') + ' (RED)';
    document.getElementById('rg-n2').innerText = (room.p2 ? room.p2.name : '대기 중...') + ' (BLUE)';

    const stBtn = document.getElementById('rg-start');
    const stEl = document.getElementById('rg-status');

    if (room.status === 'WAITING') {
        stBtn.style.display = room.p1.uid === myUid && room.p2 ? 'block' : 'none';
        stEl.innerText = room.p1.uid === myUid ? room.p2 ? '시작 버튼을 누르세요!' : '상대 대기 중...' : '방장 대기 중...';
    } else if (room.status === 'FINISHED') {
        stBtn.style.display = 'none';
        stEl.innerText = room.winnerName ? '🏆 ' + room.winnerName + ' 승리!' : '게임 종료!';
    } else {
        stBtn.style.display = 'none';
        stEl.innerText = isT ? '✅ 내 차례! 기물을 클릭 후 이동할 곳을 누르세요.' : '상대방 차례...';
    }

    const board = getRGBoard(room);
    const selP = room.selectedPiece;

    const bEl = document.getElementById('rg-board');
    bEl.innerHTML = '';

    board.forEach((stk, idx) => {
        const cell = document.createElement('div');
        cell.className = 'rg-cell';

        if (stk.length > 0) {
            const top = stk[stk.length - 1];
            const pc = document.createElement('div');

            pc.className = 'rg-piece p' + top.o + ' sz' + top.s;

            if (selP && selP.origin === 'board' && selP.idx === idx && selP.owner === top.o) {
                pc.style.borderColor = 'var(--gold)';
                pc.style.boxShadow = '0 0 15px var(--gold)';
            }

            cell.appendChild(pc);
        }

        cell.onclick = () => {
            const top = stk.length > 0 ? stk[stk.length - 1] : null;

            if (selP && selP.owner === myNum) {
                handleRGClick(idx, room, board);
            } else if (top && top.o === myNum && isT) {
                db.ref('rooms/RG/' + curRoom + '/selectedPiece').set({
                    origin: 'board',
                    idx,
                    size: top.s,
                    owner: top.o
                });
            }
        };

        bEl.appendChild(cell);
    });

    drawRGHand('rg-h1', toArr(room.p1Hand), 1, room);
    drawRGHand('rg-h2', toArr(room.p2Hand), 2, room);
}

function drawRGHand(id, hand, owner, room) {
    const el = document.getElementById(id);
    el.innerHTML = '';

    const myNum = room.p1.uid === myUid ? 1 : 2;
    const isT = room.status === 'PLAYING' && room.turn === myNum;
    const selP = room.selectedPiece;

    hand.forEach((size, idx) => {
        const item = document.createElement('div');
        item.className = 'hand-item';

        const pc = document.createElement('div');
        pc.className = 'rg-piece p' + owner + ' sz' + size;

        if (selP && selP.origin === 'hand' && selP.owner === owner && selP.hIdx === idx) {
            pc.style.borderColor = 'var(--gold)';
            pc.style.boxShadow = '0 0 15px var(--gold)';
        }

        if (owner === myNum && isT) {
            pc.onclick = () => {
                db.ref('rooms/RG/' + curRoom + '/selectedPiece').set({
                    origin: 'hand',
                    hIdx: idx,
                    size,
                    owner
                });
            };
        }

        item.appendChild(pc);
        el.appendChild(item);
    });
}

function handleRGClick(tIdx, room, board) {
    const myNum = room.p1.uid === myUid ? 1 : 2;
    const selP = room.selectedPiece;

    if (!selP || room.status !== 'PLAYING' || room.turn !== myNum || selP.owner !== myNum) return;

    if (selP.origin === 'board' && selP.idx === tIdx) {
        db.ref('rooms/RG/' + curRoom + '/selectedPiece').set(null);
        return;
    }

    const tTop = board[tIdx].length > 0 ? board[tIdx][board[tIdx].length - 1] : null;

    if (!tTop || tTop.s < selP.size) {
        const nb = board.map(s => [...s]);
        const nP1 = toArr(room.p1Hand);
        const nP2 = toArr(room.p2Hand);

        nb[tIdx].push({
            o: myNum,
            s: selP.size
        });

        if (selP.origin === 'hand') {
            (myNum === 1 ? nP1 : nP2).splice(selP.hIdx, 1);
        } else {
            nb[selP.idx].pop();
        }

        const win = rgWin(nb, myNum);

        db.ref('rooms/RG/' + curRoom).update({
            board: nb,
            p1Hand: nP1,
            p2Hand: nP2,
            turn: myNum === 1 ? 2 : 1,
            selectedPiece: null
        }).then(() => {
            if (win > 0) {
                endGame(win === 1 ? room.p1.uid : room.p2.uid, room);
            }
        });
    } else {
        alert('더 큰 기물로만 덮을 수 있습니다!');
    }
}

function rgHasLine(board, player) {
    const lines = [
        [0,1,2],
        [3,4,5],
        [6,7,8],
        [0,3,6],
        [1,4,7],
        [2,5,8],
        [0,4,8],
        [2,4,6]
    ];

    for (const [a, b, c] of lines) {
        const ta = board[a].length ? board[a][board[a].length - 1] : null;
        const tb = board[b].length ? board[b][board[b].length - 1] : null;
        const tc = board[c].length ? board[c][board[c].length - 1] : null;

        if (ta && tb && tc && ta.o === player && tb.o === player && tc.o === player) {
            return true;
        }
    }

    return false;
}

function rgWin(board, currentPlayer) {
    const me = currentPlayer;
    const enemy = currentPlayer === 1 ? 2 : 1;

    const meWin = rgHasLine(board, me);
    const enemyWin = rgHasLine(board, enemy);

    if (meWin) return me;
    if (enemyWin) return enemy;

    return 0;
}

/* 봇 */
function botGH(room) {
    botBusy = true;

    setTimeout(() => {
        botBusy = false;

        if (room.status !== 'PLAYING') return;

        db.ref('rooms/GH/' + curRoom).once('value', snap => {
            const r = snap.val();

            if (!r || r.status !== 'PLAYING' || r.hapTurn) return;

            const ba = toArr(r.board);
            const fh = toArr(r.foundHaps);

            let found = null;

            outer:
            for (let i = 0; i < 7; i++) {
                for (let j = i + 1; j < 8; j++) {
                    for (let k = j + 1; k < 9; k++) {
                        if (validHap([ba[i], ba[j], ba[k]]) && !fh.includes(i + ',' + j + ',' + k)) {
                            found = [i, j, k];
                            break outer;
                        }
                    }
                }
            }

            if (found) {
                fh.push(found.join(','));

                const action = {
                    id: Date.now(),
                    text: '🤖 컴퓨터 합 정답! (+1점)',
                    cards: found,
                    ok: true
                };

                db.ref('rooms/GH/' + curRoom).update({
                    foundHaps: fh,
                    'p2/score': (r.p2.score || 0) + 1,
                    lastAction: action
                });
            } else {
                const ns = (r.p2.score || 0) + 3;

                const action = {
                    id: Date.now(),
                    text: '🤖 컴퓨터 결 정답! (+3점)',
                    cards: [],
                    ok: true
                };

                if (r.round >= 5) {
                    db.ref('rooms/GH/' + curRoom).update({
                        'p2/score': ns,
                        lastAction: action
                    });

                    endGame((r.p1.score || 0) >= ns ? r.p1.uid : r.p2.uid, r);
                } else {
                    db.ref('rooms/GH/' + curRoom).update({
                        'p2/score': ns,
                        round: r.round + 1,
                        board: makeGHBoard(),
                        foundHaps: [],
                        hapTurn: null,
                        lastAction: action
                    });
                }
            }
        });
    }, 7000);
}

function botTJ(room) {
    botBusy = true;

    setTimeout(() => {
        botBusy = false;

        db.ref('rooms/TJ/' + curRoom).once('value', snap => {
            const r = snap.val();

            if (!r || r.status !== 'PLAYING' || r.turn !== 2) return;

            const board = getTJBoard(r);
            let moves = [];

            board.forEach((row, sr) => {
                row.forEach((p, sc) => {
                    if (!p || p.o !== 2) return;

                    for (let tr = 0; tr < 4; tr++) {
                        for (let tc = 0; tc < 3; tc++) {
                            if (canTJMove(board, sr, sc, tr, tc, 2)) {
                                const tar = board[tr][tc];

                                moves.push({
                                    type: 'move',
                                    sr,
                                    sc,
                                    tr,
                                    tc,
                                    t: p.t,
                                    tar
                                });
                            }
                        }
                    }
                });
            });

            toArr(r.p2Hand).forEach((t, hIdx) => {
                for (let tr = 0; tr < 4; tr++) {
                    for (let tc = 0; tc < 3; tc++) {
                        if (canTJDrop(board, tr, tc, t, 2)) {
                            moves.push({
                                type: 'drop',
                                tr,
                                tc,
                                t,
                                hIdx
                            });
                        }
                    }
                }
            });

            if (!moves.length) return;

            const move =
                moves.find(m => m.tar && m.tar.t === 'wang') ||
                moves[Math.floor(Math.random() * moves.length)];

            const nb = cloneTJBoard(board);
            const nH = toArr(r.p2Hand);

            if (move.type === 'move') {
                if (move.tar && move.tar.t === 'wang') {
                    nb[move.tr][move.tc] = {
                        t: move.t,
                        o: 2
                    };
                    nb[move.sr][move.sc] = null;

                    db.ref('rooms/TJ/' + curRoom).update({
                        board: nb,
                        p2Hand: nH,
                        selectedPiece: null
                    });

                    return endGame('BOT', r);
                }

                let mt = move.t;

                if (mt === 'ja' && move.tr === 3) {
                    mt = 'hu';
                }

                nb[move.tr][move.tc] = {
                    t: mt,
                    o: 2
                };
                nb[move.sr][move.sc] = null;

                if (mt === 'wang' && move.tr === 3 && !isTJKingInCheck(nb, 2)) {
                    db.ref('rooms/TJ/' + curRoom).update({
                        board: nb,
                        p2Hand: nH,
                        selectedPiece: null
                    });

                    return endGame('BOT', r);
                }
            } else {
                nb[move.tr][move.tc] = {
                    t: move.t,
                    o: 2
                };
                nH.splice(move.hIdx, 1);
            }

            db.ref('rooms/TJ/' + curRoom).update({
                board: nb,
                p2Hand: nH,
                turn: 1,
                selectedPiece: null
            });
        });
    }, 1500);
}

function botRG(room) {
    botBusy = true;

    setTimeout(() => {
        botBusy = false;

        db.ref('rooms/RG/' + curRoom).once('value', snap => {
            const r = snap.val();

            if (!r || r.status !== 'PLAYING' || r.turn !== 2) return;

            const board = getRGBoard(r);
            let moves = [];

            board.forEach((stk, i) => {
                const top = stk.length ? stk[stk.length - 1] : null;

                if (top && top.o === 2) {
                    board.forEach((ts, j) => {
                        if (i === j) return;

                        const tt = ts.length ? ts[ts.length - 1] : null;

                        if (!tt || tt.s < top.s) {
                            moves.push({
                                type: 'board',
                                sr: i,
                                tr: j,
                                s: top.s
                            });
                        }
                    });
                }
            });

            toArr(r.p2Hand).forEach((s, hIdx) => {
                board.forEach((ts, j) => {
                    const tt = ts.length ? ts[ts.length - 1] : null;

                    if (!tt || tt.s < s) {
                        moves.push({
                            type: 'hand',
                            tr: j,
                            s,
                            hIdx
                        });
                    }
                });
            });

            if (!moves.length) return;

            let best = null;

            for (const m of moves) {
                const nb = board.map(s => [...s]);

                nb[m.tr].push({
                    o: 2,
                    s: m.s
                });

                if (m.type === 'board') {
                    nb[m.sr].pop();
                }

                if (rgWin(nb, 2) === 2) {
                    best = m;
                    break;
                }
            }

            const move = best || moves[Math.floor(Math.random() * moves.length)];
            const nb = board.map(s => [...s]);
            const nH = toArr(r.p2Hand);

            nb[move.tr].push({
                o: 2,
                s: move.s
            });

            if (move.type === 'hand') {
                nH.splice(move.hIdx, 1);
            } else {
                nb[move.sr].pop();
            }

            const win = rgWin(nb, 2);

            db.ref('rooms/RG/' + curRoom).update({
                board: nb,
                p2Hand: nH,
                turn: 1,
                selectedPiece: null
            }).then(() => {
                if (win > 0) {
                    endGame(win === 1 ? r.p1.uid : r.p2.uid, r);
                }
            });
        });
    }, 1500);
}
