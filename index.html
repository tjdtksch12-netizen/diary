<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE GENIUS ONLINE 통합본 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
*{box-sizing:border-box;font-family:'Jua',system-ui,sans-serif}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#230000,#050505 72%);color:#fff;padding:24px}.wrap{max-width:980px;margin:0 auto}.box{background:rgba(0,0,0,.65);border:1px solid rgba(255,215,0,.5);border-radius:20px;padding:18px;margin:14px 0}h1{color:#ffd700;text-shadow:0 0 12px #ffd700}textarea{width:100%;height:420px;border-radius:14px;border:1px solid #ffd700;background:#111;color:#eee;padding:14px;font-family:monospace;font-size:13px;user-select:text}.btn{border:none;border-radius:12px;padding:13px 20px;background:#ffd700;color:#3b0000;font-size:1.05rem;cursor:pointer;margin:6px}.btn.dark{background:#555;color:#fff}.msg{color:#ffeb3b;margin-top:10px;white-space:pre-wrap}.small{color:#ccc;line-height:1.5}</style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <h1>THE GENIUS ONLINE 통합본 생성기</h1>
    <p class="small">아래 칸에 기존 HTML 전체 코드를 붙여넣고 <b>통합본 다운로드</b>를 누르면, 요청한 3가지 기능만 반영된 HTML 파일이 생성됩니다.</p>
    <ol class="small">
      <li>게임 선택 화면에 관리자 접속 버튼 표시</li>
      <li>게임 시작 후 로비 버튼 대신 게임 포기하기 버튼 표시</li>
      <li>포기 시 상대 승리 처리</li>
      <li>전적을 각 게임별로 카드에 표시</li>
    </ol>
  </div>
  <div class="box">
    <textarea id="src" placeholder="여기에 기존 HTML 전체 코드를 붙여넣으세요."></textarea><br>
    <button class="btn" onclick="make()">통합본 다운로드</button>
    <button class="btn dark" onclick="document.getElementById('src').value=''">비우기</button>
    <div id="msg" class="msg"></div>
  </div>
</div>
<script>
function patchHtml(src){
  let out = src;

  // 1) home 관리자 버튼 추가
  out = out.replace(
    '<button class="btn dark" onclick="logout()">로그아웃</button>',
    '<button class="btn blue" onclick="openAdmin()">관리자 접속</button><button class="btn dark" onclick="logout()">로그아웃</button>'
  );

  // 2) game 화면 로비 버튼을 상황별 버튼으로 교체
  out = out.replace(
    '<button class="btn dark" onclick="leaveGame()">로비로</button>',
    '<button id="exitBtn" class="btn dark" onclick="exitOrForfeit()">로비로</button>'
  );

  // 3) startBtn 표시 코드 뒤에 exitBtn 상태 갱신 삽입
  const startLine = "$('startBtn').style.display=(r.p1.uid===me&&r.p2&&!r.started&&!r.roundEnding)?'inline-block':'none';";
  const exitBtnCode = startLine + "if($('exitBtn')){if(r.started&&!r.roundEnding&&mySide(r)){$('exitBtn').innerText='게임 포기하기';$('exitBtn').className='btn red';}else{$('exitBtn').innerText='로비로';$('exitBtn').className='btn dark';}}";
  out = out.replace(startLine, exitBtnCode);

  // 4) leaveGame 함수 뒤에 포기 함수 추가
  const leaveLine = "function leaveGame(){goLobby(curType)}";
  const forfeitCode = leaveLine + `
function exitOrForfeit(){
  let r=window.R;
  if(r&&r.started&&!r.roundEnding){giveUpGame();return;}
  leaveGame();
}
function giveUpGame(){
  let r=window.R;
  if(!r||!r.started||r.roundEnding)return;
  let side=mySide(r);
  if(!side){alert('참가자만 게임을 포기할 수 있습니다.');return;}
  if(!confirm('정말 게임을 포기하시겠습니까?\\n포기하면 상대가 승리합니다.'))return;
  let winner=side===1?2:1;
  let loserName=side===1?r.p1.name:r.p2.name;
  finishRound(r,winner,loserName+'님이 게임을 포기했습니다.');
}`;
  out = out.replace(leaveLine, forfeitCode);

  // 5) 관리자 접속 버튼 함수 추가: _atc 함수 앞에 삽입
  const adminMarker = "let _atN=0,_atT=null;function _atc(){";
  const adminCode = `let _atN=0,_atT=null;
function openAdmin(){
  if(!me){alert('로그인 후 이용할 수 있습니다.');return;}
  let pw=prompt('관리자 비밀번호를 입력하세요.');
  if(!pw)return;
  if(pw==='1219'){$('adminWho').innerText='접속: '+me;renderAdmin();go('admin');}
  else alert('관리자 비밀번호가 틀렸습니다.');
}
function _atc(){`;
  out = out.replace(adminMarker, adminCode);

  // 6) recordResult 함수 교체
  const recordRegex = /function recordResult\(r,winner\)\{[\s\S]*?\}\s*function finishRound/;
  const recordNew = `function addUserStat(uid,game,field){
  if(!uid||uid==='BOT')return;
  db.ref('users/'+uid+'/'+field).transaction(v=>(v||0)+1);
  db.ref('users/'+uid+'/stats/'+game+'/'+field).transaction(v=>(v||0)+1);
}
function recordResult(r,winner){
  if(!db||r.isPractice||!r.p1||!r.p2||!r.p1.uid||!r.p2.uid)return;
  let game=r.type||curType,u1=r.p1.uid,u2=r.p2.uid;
  if(u2==='BOT')return;
  if(winner===1){addUserStat(u1,game,'wins');addUserStat(u2,game,'losses');}
  else if(winner===2){addUserStat(u2,game,'wins');addUserStat(u1,game,'losses');}
  else if(winner===0){addUserStat(u1,game,'draws');addUserStat(u2,game,'draws');}
}
function finishRound`;
  out = out.replace(recordRegex, recordNew);

  // 7) renderHome 함수 교체
  const renderHomeRegex = /function renderHome\(\)\{[\s\S]*?\}\s*function goLobby/;
  const renderHomeNew = `function renderHome(){
  let h=$('gameCards');
  h.innerHTML='<p style="color:#aaa;font-size:.9rem">불러오는 중...</p>';
  let userPromise=me&&db?db.ref('users/'+me).once('value').then(s=>s.val()||{}):Promise.resolve({});
  let openPromise=db?db.ref('settings/openGames').once('value').then(s=>s.val()||{}):Promise.resolve({});
  Promise.all([userPromise,openPromise]).then(([user,openSettings])=>{
    let stats=user.stats||{};
    h.innerHTML='';
    Object.keys(GAMES).forEach(k=>{
      let open=openSettings[k]!==false;
      let st=stats[k]||{},w=st.wins||0,l=st.losses||0,d=st.draws||0,total=w+l+d,rate=total?Math.round(w/total*100)+'%':'-';
      let dEl=document.createElement('div');
      dEl.className='card'+(open?'':' cardClosed');
      dEl.innerHTML='<h2>'+GAMES[k]+'</h2><p>'+(open?'1:1 로비 입장':'🔒 준비 중')+'</p>'+
        '<div style="margin-top:10px;font-size:.95rem;line-height:1.45;color:#ddd">'+
        '<span style="color:#ffd700">'+w+'승</span> <span style="color:#f55">'+l+'패</span> <span style="color:#aaa">'+d+'무</span><br>'+
        '<span style="color:#888;font-size:.82rem">승률 '+rate+'</span></div>';
      if(open)dEl.onclick=()=>goLobby(k);
      h.appendChild(dEl);
    });
    if($('recBadge'))$('recBadge').innerHTML='';
  }).catch(()=>{
    h.innerHTML='';
    Object.keys(GAMES).forEach(k=>{
      let d=document.createElement('div');d.className='card';
      d.innerHTML='<h2>'+GAMES[k]+'</h2><p>1:1 로비 입장</p><div style="margin-top:10px;font-size:.9rem;color:#aaa">전적 불러오기 실패</div>';
      d.onclick=()=>goLobby(k);h.appendChild(d);
    });
  });
}
function goLobby`;
  out = out.replace(renderHomeRegex, renderHomeNew);

  return out;
}
function make(){
  const src = document.getElementById('src').value;
  const msg = document.getElementById('msg');
  if(!src.trim()){msg.textContent='기존 HTML 코드를 먼저 붙여넣어 주세요.';return;}
  let out = patchHtml(src);
  let checks = [
    ['관리자 접속 버튼', out.includes('onclick="openAdmin()"')],
    ['게임 포기 버튼', out.includes('exitOrForfeit') && out.includes('giveUpGame')],
    ['게임별 전적', out.includes('/stats/') && out.includes('addUserStat')]
  ];
  let failed = checks.filter(x=>!x[1]).map(x=>x[0]);
  if(failed.length){msg.textContent='일부 적용 확인 실패: '+failed.join(', ')+'\n원본 코드 구조가 달라졌을 수 있습니다.';}
  else{msg.textContent='적용 완료. 다운로드를 시작합니다.';}
  const blob = new Blob([out], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'THE_GENIUS_ONLINE_통합본.html';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
</script>
</body>
</html>
