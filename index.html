5+i);d.onclick=()=>snPick(i);$('snBoard').appendChild(d)})}function snPick(i){let r=window.R;if(!r.started||Date.now()<r.revealUntil||Date.now()<r.reviewUntil)return;let s=arr(r.answerTurn&&r.answerTurn.selected);s=s.includes(i)?s.filter(x=>x!==i):(s.length<3?[...s,i]:s);updateRoom({answerTurn:{uid:me,selected:s}});if(s.length===3)setTimeout(()=>snCheck(s),220)}function snClear(){updateRoom({answerTurn:null})}function snTimeoutCheck(r){if(!r.started||r.roundEnding)return;let now=Date.now();if(r.revealUntil&&now<r.revealUntil)return;if(r.reviewUntil&&now<r.reviewUntil)return;if(!r.answerDeadline||now<r.answerDeadline)return;if(!(r.p1&&r.p1.uid===me))return;let idx=(r.targetIdx||0)+1;if(idx>=arr(r.targets).length){let p1f=(r.p1&&r.p1.score)||0,p2f=(r.p2&&r.p2.score)||0,w=p1f>=p2f?1:2;return finishRound(r,w,r.p1.name+' '+p1f+'점 vs '+r.p2.name+' '+p2f+'점 — 같은 숫자 찾기 종료',{targetIdx:idx,answerTurn:null})}updateRoom({targetIdx:idx,target:arr(r.targets)[idx],answerTurn:null,answerDeadline:now+10000,lastJudge:{ok:false,msg:'시간 초과! 다음 문제로 넘어갑니다.'}});setTimeout(()=>updateRoom({lastJudge:null}),1500)}function snCheck(s){let r=window.R,bd=arr(r.b),cards=s.map(x=>bd[x]),ops=cards.filter(v=>typeof v==='string'),nums=cards.filter(v=>typeof v==='number'),ok=false;if(ops.length===1&&nums.length===2){let[n1,n2]=nums,op=ops[0],vals=[];if(op==='+')vals=[n1+n2];if(op==='-')vals=[n1-n2,n2-n1];if(op==='×')vals=[n1*n2];if(op==='÷'){if(n2)vals.push(n1/n2);if(n1)vals.push(n2/n1)}ok=vals.includes(r.target)}let side=mySide(r),score=(side===1?r.p1.score:r.p2.score)+(ok?1:0),idx=(r.targetIdx||0)+(ok?1:0),ws=ok?0:((r.wrongStreak||0)+1),review=0;if(!ok&&ws>=3){ws=0;review=Date.now()+5000}let nextDl=review?review+10000:Date.now()+10000;let up={answerTurn:null,targetIdx:idx,target:arr(r.targets)[idx]||r.target,wrongStreak:ws,reviewUntil:review,answerDeadline:nextDl,lastJudge:{ok,msg:ok?('선택: '+cards.join(' ')+' = '+r.target+' ✓'):('선택: '+cards.join(' ')+' ≠ '+r.target)}};up[(side===1?'p1':'p2')+'/scor function mrConnected(g){var C={H:[[0,-1],[0,1]],V:[[-1,0],[1,0]],NE:[[-1,0],[0,1]],NW:[[-1,0],[0,-1]],SE:[[1,0],[0,1]],SW:[[1,0],[0,-1]]};var vis=new Set(),q=[[4,0]];vis.add('4,0');while(q.length){var cur=q.shift(),r=cur[0],c=cur[1];var dirs=(r===4&&c===0)?[[0,1]]:(C[(g[r+','+c]||{}).o]||[]);for(var d=0;d<dirs.length;d++){var nr=r+dirs[d][0],nc=c+dirs[d][1];if(nr<0||nr>8||nc<0||nc>8)continue;if(nr===4&&nc===8)return true;var nk=nr+','+nc;if(vis.has(nk))continue;var nT=g[nk];if(!nT)continue;var nd=C[nT.o]||[],ok=false;for(var i=0;i<nd.length;i++)if(nr+nd[i][0]===r&&nc+nd[i][1]===c){ok=true;break}if(!ok)continue;vis.add(nk);q.push([nr,nc]);}}return false;}
